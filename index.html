<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Manager — Checklist System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── Utilities ───────────────────────────────────────────────────────────────
    let _counter = 0;
    const uid = () => `id_${Date.now()}_${++_counter}`;

    const createItem = () => ({
      id: uid(), task: "", details: "", how: "", secondaryHow: "", frequency: "", priority: "", assignee: "", time: "", supplies: "", completed: false, notNeeded: false, prevIncomplete: false, lastCompleted: "",
    });

    const createRoom = (name) => ({
      id: uid(), name, restocking: [], cleaning: [], monthly: [],
    });

    const createZone = (name = "New Zone") => ({
      id: uid(), type: 'zone', name, collapsed: false, items: [],
    });

    // Flatten a mixed list (zones + items) → just the task items
    const flattenList = (list) => (list || []).flatMap(e => e.type === 'zone' ? e.items : [e]);

    // Remove an item by id from anywhere in a mixed list
    const deleteFromList = (list, id) =>
      list.map(e => e.type === 'zone' ? { ...e, items: e.items.filter(t => t.id !== id) } : e)
          .filter(e => e.id !== id);

    // Update a field on an item anywhere in a mixed list
    const updateInList = (list, id, field, val) =>
      list.map(e => {
        if (e.type === 'zone') {
          const idx = e.items.findIndex(t => t.id === id);
          if (idx < 0) return e;
          const items = [...e.items];
          items[idx] = { ...items[idx], [field]: val };
          return { ...e, items };
        }
        return e.id === id ? { ...e, [field]: val } : e;
      });

    const LOCATIONS = ["The Park House", "The Studio", "The Lamon House"];

    const FREQUENCY_OPTIONS = ["Weekly", "Bi-Weekly", "Monthly", "Quarterly", "Yearly", "As Needed"];

    const PRIORITY_OPTIONS = ["High", "Medium", "Low"];
    const PRIORITY_STYLES = {
      High:   { pill: "bg-red-100 text-red-700 border border-red-200",    dot: "bg-red-400"    },
      Medium: { pill: "bg-yellow-100 text-yellow-700 border border-yellow-200", dot: "bg-yellow-400" },
      Low:    { pill: "bg-green-100 text-green-700 border border-green-200",  dot: "bg-green-400"  },
    };

    const LOCATION_COLORS = {
      "The Park House": { tab: "bg-sky-600", dot: "bg-sky-500" },
      "The Studio":     { tab: "bg-violet-600", dot: "bg-violet-500" },
      "The Lamon House":{ tab: "bg-teal-600", dot: "bg-teal-500" },
    };

    // Sample starter data so the UI feels populated on first load
    const buildSampleData = () => {
      const ph_kitchen = createRoom("Kitchen");
      ph_kitchen.restocking = [
        { id: uid(), task: "Paper Towels",   details: "Under sink cabinet",    secondaryHow: "Check Amazon sub.",  frequency: "Weekly",    assignee: "" },
        { id: uid(), task: "Dish Soap",      details: "Dawn original",         secondaryHow: "Order if < 1 bottle", frequency: "Monthly",  assignee: "" },
        { id: uid(), task: "Coffee / Pods",  details: "Nespresso drawer",      secondaryHow: "Reorder at < 5 pods",frequency: "Weekly",   assignee: "" },
        { id: uid(), task: "Hand Soap",      details: "Foaming pump by sink",  secondaryHow: "Refill from bulk jug",frequency: "As needed",assignee: "" },
      ];
      ph_kitchen.cleaning = [
        { id: uid(), task: "Wipe countertops", details: "All surfaces + backsplash", secondaryHow: "All-purpose spray", frequency: "Daily",    assignee: "" },
        { id: uid(), task: "Clean stovetop",   details: "Burners & drip pans",       secondaryHow: "Degreaser if needed",frequency: "Weekly",  assignee: "" },
        { id: uid(), task: "Empty trash",      details: "Replace bag (tall kitchen)", secondaryHow: "Bags under sink",    frequency: "As needed",assignee: "" },
        { id: uid(), task: "Wipe appliances",  details: "Toaster, microwave outside", secondaryHow: "Damp cloth",        frequency: "Weekly",  assignee: "" },
      ];
      ph_kitchen.monthly = [
        { id: uid(), task: "Deep clean fridge",   details: "Remove all items, wipe shelves", secondaryHow: "Baking soda + water", frequency: "Monthly", assignee: "" },
        { id: uid(), task: "Clean oven interior", details: "Racks + bottom",                 secondaryHow: "Oven cleaner spray",  frequency: "Monthly", assignee: "" },
        { id: uid(), task: "Replace Brita filter",details: "Pitcher in fridge",              secondaryHow: "Filters in pantry",   frequency: "Monthly", assignee: "" },
      ];

      const ph_master = createRoom("Master Bedroom");
      ph_master.restocking = [
        { id: uid(), task: "Kleenex",      details: "Nightstand box",     secondaryHow: "Hall closet stock",  frequency: "As needed", assignee: "" },
        { id: uid(), task: "Phone charger",details: "Confirm working",    secondaryHow: "Check both sides",   frequency: "Weekly",    assignee: "" },
      ];
      ph_master.cleaning = [
        { id: uid(), task: "Change bed linens", details: "Sheets + pillowcases", secondaryHow: "Fresh set in linen closet", frequency: "Weekly",    assignee: "" },
        { id: uid(), task: "Vacuum floors",     details: "Under bed + corners",  secondaryHow: "Attachment for edges",     frequency: "Weekly",    assignee: "" },
        { id: uid(), task: "Dust surfaces",     details: "All furniture + fans",  secondaryHow: "Microfiber cloth",         frequency: "Weekly",    assignee: "" },
      ];

      return {
        "The Park House":  { rooms: [ph_kitchen, ph_master], employees: [] },
        "The Studio":      { rooms: [], employees: [] },
        "The Lamon House": { rooms: [], employees: [] },
      };
    };

    // ─── Time helpers ────────────────────────────────────────────────────────────
    const parseMinutes = (str) => {
      if (!str) return 0;
      const s = str.toLowerCase().trim();
      const hr = s.match(/(\d+\.?\d*)\s*(hr|hrs|hour|hours)/);
      if (hr) return Math.round(parseFloat(hr[1]) * 60);
      const mn = s.match(/(\d+\.?\d*)\s*(min|mins|minute|minutes)?/);
      if (mn && mn[1]) return Math.round(parseFloat(mn[1]));
      return 0;
    };

    const formatTime = (mins) => {
      if (!mins) return "—";
      if (mins < 60) return `${mins} min`;
      const h = Math.floor(mins / 60), m = mins % 60;
      return m > 0 ? `${h}h ${m}m` : `${h}h`;
    };

    // ─── EditableCell ─────────────────────────────────────────────────────────────
    function EditableCell({ value, onSave, placeholder = "—" }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(value);
      const taRef = React.useRef(null);

      const commit = () => { onSave(draft); setEditing(false); };

      // Auto-resize whenever draft changes or editing opens
      React.useEffect(() => {
        if (taRef.current) {
          taRef.current.style.height = "auto";
          taRef.current.style.height = taRef.current.scrollHeight + "px";
        }
      }, [draft, editing]);

      if (editing) {
        return (
          <textarea
            ref={taRef}
            autoFocus
            value={draft}
            rows={1}
            onChange={e => setDraft(e.target.value)}
            onBlur={commit}
            onKeyDown={e => {
              if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
                // Cmd/Ctrl+Enter → insert newline at cursor
                e.preventDefault();
                const start = e.target.selectionStart;
                const end   = e.target.selectionEnd;
                const next  = draft.slice(0, start) + "\n" + draft.slice(end);
                setDraft(next);
                requestAnimationFrame(() => {
                  if (taRef.current) taRef.current.selectionStart = taRef.current.selectionEnd = start + 1;
                });
              } else if (e.key === "Tab" || (e.key === "Enter" && !e.shiftKey)) {
                e.preventDefault(); commit();
              } else if (e.key === "Escape") {
                setDraft(value); setEditing(false);
              }
            }}
            style={{ resize: "none", overflow: "hidden" }}
            className="w-full min-w-0 border border-blue-400 rounded px-1.5 py-0.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 bg-blue-50 block"
          />
        );
      }
      return (
        <span
          onClick={() => { setDraft(value); setEditing(true); }}
          className={`block min-h-5 rounded px-1.5 py-0.5 cursor-text text-xs hover:bg-blue-50 hover:ring-1 hover:ring-blue-200 transition-all break-words whitespace-pre-wrap ${
            value ? "text-gray-800" : "text-gray-300 italic"
          }`}
        >
          {value || placeholder}
        </span>
      );
    }

    // ─── AssigneeCell ─────────────────────────────────────────────────────────────
    function AssigneeCell({ value, employees, onSave }) {
      const [open, setOpen] = useState(false);
      const [pos, setPos] = useState({ top: 0, left: 0 });
      const btnRef = React.useRef(null);
      const initial = value ? value.charAt(0).toUpperCase() : null;

      const handleOpen = () => {
        if (btnRef.current) {
          const r = btnRef.current.getBoundingClientRect();
          setPos({ top: r.bottom + 4, left: r.left + r.width / 2 });
        }
        setOpen(v => !v);
      };

      return (
        <div className="flex justify-center">
          {/* Avatar bubble */}
          <button
            ref={btnRef}
            onClick={handleOpen}
            title={value || "Click to assign"}
            className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all select-none ${
              value
                ? "bg-blue-600 text-white hover:bg-blue-500 shadow-sm"
                : "bg-gray-100 text-gray-300 hover:bg-gray-200 border-2 border-dashed border-gray-300"
            }`}
          >
            {value ? initial : <span className="text-lg leading-none mb-0.5">+</span>}
          </button>

          {open && (
            <>
              {/* Backdrop to close on outside click */}
              <div className="fixed inset-0 z-40" onClick={() => setOpen(false)} />
              {/* Dropdown — fixed so it escapes overflow:hidden on the panel */}
              <div className="fixed z-50 bg-white rounded-xl shadow-xl border border-gray-200 py-1.5 min-w-44 overflow-hidden"
                   style={{ top: pos.top, left: pos.left, transform: "translateX(-50%)" }}>
                <button
                  onClick={() => { onSave(""); setOpen(false); }}
                  className={`w-full text-left px-3 py-1.5 text-xs hover:bg-gray-50 flex items-center gap-2 ${
                    !value ? "text-blue-600 font-semibold" : "text-gray-400 italic"
                  }`}
                >
                  <span className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 flex-none text-xs font-bold">—</span>
                  Unassigned
                </button>
                {employees.length === 0 ? (
                  <p className="px-3 py-2 text-xs text-gray-300 italic">Add employees in Location Settings</p>
                ) : (
                  employees.map(emp => (
                    <button
                      key={emp.id}
                      onClick={() => { onSave(emp.name); setOpen(false); }}
                      className={`w-full text-left px-3 py-1.5 text-xs flex items-center gap-2 transition-colors ${
                        value === emp.name
                          ? "bg-blue-50 text-blue-700 font-semibold"
                          : "text-gray-700 hover:bg-blue-50"
                      }`}
                    >
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold flex-none ${
                        value === emp.name ? "bg-blue-600 text-white" : "bg-blue-400 text-white"
                      }`}>
                        {emp.name.charAt(0).toUpperCase()}
                      </span>
                      <span className="truncate">{emp.name}</span>
                      {emp.role && <span className="text-gray-400 text-xs ml-auto flex-none pl-1">{emp.role}</span>}
                    </button>
                  ))
                )}
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── ChecklistRow ─────────────────────────────────────────────────────────────
    function ChecklistRow({ item, idx, total, employees, showHow, showSecondaryHow, showFrequency, showAssignee, showTime, showSupplies, showPriority, showLastDone, onUpdate, onDelete, onMoveUp, onMoveDown, onDragStart, onDragOver, onDrop, onDragEnd, isDragging, isDragOver, isInZone, zones, onMoveToZone, listKey, onMoveToList }) {
      const [showMoveMenu,     setShowMoveMenu]     = useState(false);
      const [showListMoveMenu, setShowListMoveMenu] = useState(false);
      const [moveMenuPos,     setMoveMenuPos]     = useState({ bottom: 0, right: 0 });
      const [listMoveMenuPos, setListMoveMenuPos] = useState({ bottom: 0, right: 0 });
      const moveMenuBtnRef     = React.useRef(null);
      const listMoveMenuBtnRef = React.useRef(null);

      const openMoveMenu = () => {
        if (moveMenuBtnRef.current) {
          const r = moveMenuBtnRef.current.getBoundingClientRect();
          setMoveMenuPos({ bottom: window.innerHeight - r.top + 4, right: window.innerWidth - r.right });
        }
        setShowMoveMenu(v => !v);
      };
      const openListMoveMenu = () => {
        if (listMoveMenuBtnRef.current) {
          const r = listMoveMenuBtnRef.current.getBoundingClientRect();
          setListMoveMenuPos({ bottom: window.innerHeight - r.top + 4, right: window.innerWidth - r.right });
        }
        setShowListMoveMenu(v => !v);
      };
      const today = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
      const ps = item.priority ? PRIORITY_STYLES[item.priority] : null;

      const handleCheck = () => {
        const nowDone = !item.completed;
        onUpdate("completed", nowDone);
        if (nowDone) {
          onUpdate("lastCompleted", today);
          if (item.notNeeded)     onUpdate("notNeeded", false);
          if (item.prevIncomplete) onUpdate("prevIncomplete", false);
        }
      };

      const handleNotNeeded = () => {
        const nowNotNeeded = !item.notNeeded;
        onUpdate("notNeeded", nowNotNeeded);
        if (nowNotNeeded && item.completed)     onUpdate("completed", false);
        if (nowNotNeeded && item.prevIncomplete) onUpdate("prevIncomplete", false);
      };

      return (
        <tr
          draggable
          onDragStart={onDragStart}
          onDragOver={onDragOver}
          onDrop={onDrop}
          onDragEnd={onDragEnd}
          className={`border-b border-gray-100 group/row transition-all ${isInZone ? "border-l-2 border-l-slate-200" : ""} ${
            isDragging          ? "opacity-40 bg-slate-100" :
            isDragOver          ? "bg-blue-50 border-t-2 border-t-blue-400" :
            item.completed      ? "bg-green-50/40" :
            item.notNeeded      ? "bg-amber-50/50" :
            item.prevIncomplete ? "bg-rose-50/40" :
            isInZone            ? "bg-slate-100/70 hover:bg-slate-200/50" :
                                  "hover:bg-slate-50/60"
          }`}
        >
          {/* Drag handle */}
          <td className="px-1 py-1.5 align-middle no-print" style={{ width: "1.5rem" }}>
            <div className="flex justify-center cursor-grab active:cursor-grabbing text-gray-300 hover:text-gray-500 select-none" title="Drag to reorder">
              <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 16 16">
                <circle cx="5" cy="4"  r="1.3"/><circle cx="11" cy="4"  r="1.3"/>
                <circle cx="5" cy="8"  r="1.3"/><circle cx="11" cy="8"  r="1.3"/>
                <circle cx="5" cy="12" r="1.3"/><circle cx="11" cy="12" r="1.3"/>
              </svg>
            </div>
          </td>

          {/* Completion checkbox */}
          <td className="px-1 py-1.5 align-middle text-center" style={{ width: "2rem" }}>
            <button
              onClick={handleCheck}
              title={item.completed ? "Mark incomplete" : "Mark complete"}
              className={`w-5 h-5 rounded-full border-2 flex items-center justify-center mx-auto transition-all ${
                item.completed
                  ? "bg-green-500 border-green-500 text-white"
                  : "border-gray-300 hover:border-green-400"
              }`}
            >
              {item.completed && (
                <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7"/>
                </svg>
              )}
            </button>
          </td>

          {/* Not-needed checkbox (△) */}
          <td className="px-1 py-1.5 align-middle text-center" style={{ width: "2rem" }}>
            <button
              onClick={handleNotNeeded}
              title={item.notNeeded ? "Clear not-needed" : "Mark as not needed"}
              className={`w-5 h-5 rounded-full border-2 flex items-center justify-center mx-auto transition-all ${
                item.notNeeded
                  ? "bg-amber-400 border-amber-400 text-white"
                  : "border-gray-300 hover:border-amber-400"
              }`}
            >
              {item.notNeeded && (
                <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 16 16">
                  <path d="M8 2 L14.5 13 L1.5 13 Z"/>
                </svg>
              )}
            </button>
          </td>

          {/* Task cell — shows PRV INC badge if applicable */}
          <td className="px-2 py-1.5 align-top">
            {item.prevIncomplete && (
              <span className="no-print inline-block text-xs font-bold px-1.5 py-0 rounded border border-rose-300 bg-rose-100 text-rose-600 mb-0.5 leading-5">prv inc</span>
            )}
            <EditableCell value={item.task} onSave={val => onUpdate("task", val)} placeholder="click to edit" />
          </td>
          <td className="px-2 py-1.5 align-top">
            <EditableCell value={item.details} onSave={val => onUpdate("details", val)} placeholder="click to edit" />
          </td>
          {showHow && (
            <td className="px-2 py-1.5 align-top">
              <EditableCell value={item.how} onSave={val => onUpdate("how", val)} placeholder="click to edit" />
            </td>
          )}
          {showSecondaryHow && (
            <td className="px-2 py-1.5 align-top">
              <EditableCell value={item.secondaryHow} onSave={val => onUpdate("secondaryHow", val)} placeholder="click to edit" />
            </td>
          )}

          {/* Priority — traffic light dropdown */}
          {showPriority && (
            <td className="px-1 py-1.5 align-middle text-center" style={{ width: "7rem" }}>
              {ps ? (
                <span className={`inline-block text-xs font-semibold px-2 py-0.5 rounded-full ${ps.pill}`}>
                  <select
                    value={item.priority}
                    onChange={e => onUpdate("priority", e.target.value)}
                    className="bg-transparent border-none outline-none cursor-pointer font-semibold text-xs w-full"
                  >
                    <option value="">— none —</option>
                    {PRIORITY_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                </span>
              ) : (
                <select
                  value=""
                  onChange={e => onUpdate("priority", e.target.value)}
                  className="w-full text-xs rounded border border-transparent bg-transparent cursor-pointer text-gray-400 hover:border-gray-300 hover:bg-gray-50 focus:outline-none focus:ring-1 focus:ring-blue-400 py-0.5 px-1 transition-all"
                >
                  <option value="" disabled>— none —</option>
                  {PRIORITY_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              )}
            </td>
          )}

          {/* Frequency */}
          {showFrequency && (
            <td className="px-2 py-1.5 align-middle" style={{ width: "9%" }}>
              <select
                value={item.frequency || ""}
                onChange={e => onUpdate("frequency", e.target.value)}
                className="w-full text-xs rounded border border-transparent bg-transparent cursor-pointer text-gray-700 hover:border-blue-300 hover:bg-blue-50 focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400 py-0.5 px-1 transition-all"
              >
                <option value="" disabled>— pick —</option>
                {FREQUENCY_OPTIONS.map(opt => (
                  <option key={opt} value={opt}>{opt}</option>
                ))}
              </select>
            </td>
          )}

          {/* Assignee — bubble avatar with dropdown */}
          {showAssignee && (
            <td className="px-1 py-1.5 align-middle text-center" style={{ width: "2.5rem" }}>
              <AssigneeCell
                value={item.assignee}
                employees={employees}
                onSave={val => onUpdate("assignee", val)}
              />
            </td>
          )}

          {/* Time */}
          {showTime && (
            <td className="px-2 py-1.5 align-middle" style={{ width: "2.5rem" }}>
              <EditableCell
                value={item.time}
                onSave={val => onUpdate("time", val)}
                placeholder="—"
              />
            </td>
          )}

          {/* Supplies */}
          {showSupplies && (
            <td className="px-2 py-1.5 align-top">
              <EditableCell value={item.supplies} onSave={val => onUpdate("supplies", val)} placeholder="—" />
            </td>
          )}

          {/* Last Done */}
          {showLastDone && (
            <td className="px-2 py-1.5 align-middle" style={{ width: "6.5rem" }}>
              <EditableCell
                value={item.lastCompleted}
                onSave={val => onUpdate("lastCompleted", val)}
                placeholder="—"
              />
            </td>
          )}

          {/* Actions — delete always visible, reorder on hover */}
          <td className="px-1 py-1 align-middle no-print" style={{ width: "4rem" }}>
            <div className="flex items-center gap-0.5">
              <div className="flex opacity-0 group-hover/row:opacity-100 transition-opacity">
                <button onClick={onMoveUp} disabled={idx === 0}
                  className="p-1 rounded text-gray-300 hover:text-gray-500 disabled:opacity-20 hover:bg-gray-100 text-xs leading-none"
                  title="Move up"
                >▲</button>
                <button onClick={onMoveDown} disabled={idx === total - 1}
                  className="p-1 rounded text-gray-300 hover:text-gray-500 disabled:opacity-20 hover:bg-gray-100 text-xs leading-none"
                  title="Move down"
                >▼</button>
              </div>
              {/* Move to zone button */}
              {zones && zones.length > 0 && onMoveToZone && (
                <div className="relative">
                  <button
                    ref={moveMenuBtnRef}
                    onClick={openMoveMenu}
                    className="p-1 rounded text-gray-300 hover:text-blue-500 hover:bg-blue-50 text-xs leading-none"
                    title="Move to zone"
                  >⊞</button>
                  {showMoveMenu && (
                    <>
                      <div className="fixed inset-0 z-40" onClick={() => setShowMoveMenu(false)} />
                      <div className="fixed z-50 bg-white rounded-xl shadow-xl border border-gray-200 py-1 min-w-40 overflow-hidden"
                           style={{ bottom: moveMenuPos.bottom, right: moveMenuPos.right }}>
                        {isInZone && (
                          <button
                            onClick={() => { onMoveToZone(null); setShowMoveMenu(false); }}
                            className="w-full text-left px-3 py-1.5 text-xs text-gray-600 hover:bg-gray-50 flex items-center gap-2"
                          >
                            <span className="text-gray-400">↑</span> Top level
                          </button>
                        )}
                        {zones.map(z => (
                          <button key={z.id}
                            onClick={() => { onMoveToZone(z.id); setShowMoveMenu(false); }}
                            className="w-full text-left px-3 py-1.5 text-xs text-gray-600 hover:bg-blue-50 hover:text-blue-700 flex items-center gap-2 truncate"
                          >
                            <span className="text-gray-400">▸</span>
                            <span className="truncate">{z.name}</span>
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              )}
              {/* Move to different list */}
              {onMoveToList && (
                <div className="relative">
                  <button
                    ref={listMoveMenuBtnRef}
                    onClick={openListMoveMenu}
                    className="p-1 rounded text-gray-300 hover:text-indigo-500 hover:bg-indigo-50 leading-none transition-colors"
                    title="Move to a different list"
                  >
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                    </svg>
                  </button>
                  {showListMoveMenu && (
                    <>
                      <div className="fixed inset-0 z-40" onClick={() => setShowListMoveMenu(false)} />
                      <div className="fixed z-50 bg-white rounded-xl shadow-xl border border-gray-200 py-1.5 min-w-44 overflow-hidden"
                           style={{ bottom: listMoveMenuPos.bottom, right: listMoveMenuPos.right }}>
                        <p className="px-3 pb-1 text-[10px] font-bold text-gray-400 uppercase tracking-wider">Move to list</p>
                        {LIST_META.filter(m => m.key !== listKey).map(({ key, label, abbr, light, text, border }) => (
                          <button key={key}
                            onClick={() => { onMoveToList(key); setShowListMoveMenu(false); }}
                            className={`w-full text-left px-3 py-1.5 text-xs font-semibold flex items-center gap-2 hover:${light} transition-colors`}
                          >
                            <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold border ${light} ${text} ${border}`}>{abbr}</span>
                            <span className={text}>{label}</span>
                          </button>
                        ))}
                      </div>
                    </>
                  )}
                </div>
              )}
              {/* Delete always visible */}
              <button onClick={onDelete}
                className="p-1 rounded text-gray-300 hover:text-red-500 hover:bg-red-50 text-xs leading-none"
                title="Delete row"
              >✕</button>
            </div>
          </td>
        </tr>
      );
    }

    // ─── ChecklistPanel ───────────────────────────────────────────────────────────
    const ACCENT = {
      amber:  { border: "border-l-4 border-amber-400",  bg: "bg-amber-50",   title: "text-amber-600",  count: "bg-amber-100 text-amber-700",  add: "text-amber-600 border-amber-300 hover:bg-amber-50",  dot: "bg-amber-400"  },
      emerald:{ border: "border-l-4 border-emerald-400", bg: "bg-emerald-50", title: "text-emerald-600", count: "bg-emerald-100 text-emerald-700", add: "text-emerald-600 border-emerald-300 hover:bg-emerald-50", dot: "bg-emerald-400" },
      violet: { border: "border-l-4 border-violet-400",  bg: "bg-violet-50",  title: "text-violet-600",  count: "bg-violet-100 text-violet-700",  add: "text-violet-600 border-violet-300 hover:bg-violet-50",  dot: "bg-violet-400"  },
    };

    // Eye-toggle icon
    function EyeIcon({ open }) {
      return open ? (
        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      ) : (
        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        </svg>
      );
    }

    function ChecklistPanel({ title, accent, list, employees, onUpdate, onAdd, onDelete, onMove,
                              onAddZone, onDeleteZone, onRenameZone, onToggleZone,
                              onAddItemToZone, onReorderTopLevel, onReorderInZone, onMoveTaskToZone, onMoveTaskCross,
                              requestConfirm, listKey, onMoveToList }) {
      const c = ACCENT[accent] || ACCENT.amber;
      const [showHow,          setShowHow]          = useState(true);
      const [showSecondaryHow, setShowSecondaryHow] = useState(true);
      const [showFrequency,    setShowFrequency]    = useState(true);
      const [showAssignee,     setShowAssignee]     = useState(true);
      const [showTime,         setShowTime]         = useState(true);
      const [showSupplies,     setShowSupplies]     = useState(true);
      const [showPriority,     setShowPriority]     = useState(true);
      const [showLastDone,     setShowLastDone]     = useState(true);
      // Unified drag state
      // dragSrc: null | { kind:'topTask', topIdx, id } | { kind:'topZone', topIdx } | { kind:'zoneTask', zoneId, zIdx, id }
      // dragOver: null | { kind:'topTask', topIdx } | { kind:'zoneHeader', zoneId, topIdx } | { kind:'zoneTask', zoneId, zIdx } | { kind:'zoneDrop', zoneId }
      const [dragSrc,  setDragSrc]  = useState(null);
      const [dragOver, setDragOver] = useState(null);
      const clearDrag = () => { setDragSrc(null); setDragOver(null); };
      // Zone inline rename
      const [editingZoneId,   setEditingZoneId]   = useState(null);
      const [editingZoneName, setEditingZoneName] = useState("");

      const allItems = flattenList(list);
      const completedCount = allItems.filter(i => i.completed).length;
      const totalCols = 3 + 1 + (showHow?1:0) + (showSecondaryHow?1:0) + (showPriority?1:0) + (showFrequency?1:0) + (showAssignee?1:0) + (showTime?1:0) + (showSupplies?1:0) + (showLastDone?1:0) + 1;

      // All zones in this list (for move-to-zone dropdown)
      const zones = (list || []).filter(e => e.type === 'zone');

      const commitZoneRename = () => {
        if (editingZoneName.trim()) onRenameZone(editingZoneId, editingZoneName.trim());
        setEditingZoneId(null);
      };

      const ToggleTh = ({ show, onToggle, label, width, center }) => (
        <th className={`py-2 px-2 whitespace-nowrap ${center ? "text-center" : "text-left"}`} style={{ width }}>
          <div className={`flex items-center gap-1 ${center ? "justify-center" : ""}`}>
            {show && <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{label}</span>}
            <button onClick={onToggle} title={`${show ? "Hide" : "Show"} ${label} column`}
              className={`p-0.5 rounded transition-colors no-print ${show ? "text-gray-400 hover:text-gray-600" : "text-gray-300 hover:text-gray-500"}`}>
              <EyeIcon open={show} />
            </button>
          </div>
        </th>
      );

      return (
        <div className="flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden print-panel">
          {/* Panel header */}
          <div className={`${c.bg} ${c.border} px-4 py-3 flex items-center gap-2.5 border-b border-gray-100`}>
            <span className={`w-2 h-2 rounded-full flex-none ${c.dot}`} />
            <h3 className={`font-bold text-sm uppercase tracking-widest mr-1 ${c.title}`}>{title}</h3>
            <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full ${c.count}`}>
              {allItems.length} task{allItems.length !== 1 ? "s" : ""}
            </span>
            <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full ${c.count}`}>
              {formatTime(allItems.reduce((s, i) => s + parseMinutes(i.time), 0))}
            </span>
            {allItems.length > 0 && (
              <span className="ml-auto text-xs font-semibold px-2.5 py-0.5 rounded-full bg-green-100 text-green-700">
                {completedCount}/{allItems.length} done
              </span>
            )}
          </div>

          {/* Table */}
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="bg-gray-50 border-b border-gray-200">
                  <th className="no-print" style={{ width: "1.5rem" }} />
                  <th className="py-2 px-1 text-center no-print" style={{ width: "2rem" }}>
                    <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">✓</span>
                  </th>
                  <th className="py-2 px-1 text-center no-print" style={{ width: "2rem" }}>
                    <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">△</span>
                  </th>
                  {[
                    { label: "Task",    width: "13%" },
                    { label: "Details", width: "20%" },
                  ].map(({ label, width }) => (
                    <th key={label} className="text-left px-2 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap" style={{ width }}>
                      {label}
                    </th>
                  ))}
                  <ToggleTh show={showHow}          onToggle={() => setShowHow(v=>!v)}          label="How?"          width="20%" />
                  <ToggleTh show={showSecondaryHow} onToggle={() => setShowSecondaryHow(v=>!v)} label="Secondary How"  width="20%" />
                  <ToggleTh show={showPriority}     onToggle={() => setShowPriority(v=>!v)}     label="Priority"       width="7rem" />
                  <ToggleTh show={showFrequency}    onToggle={() => setShowFrequency(v=>!v)}    label="Frequency"      width="9%" />
                  <ToggleTh show={showAssignee}     onToggle={() => setShowAssignee(v=>!v)}     label="Who"            width="2.5rem" center />
                  <ToggleTh show={showTime}         onToggle={() => setShowTime(v=>!v)}         label="Time (min)"     width="2.5rem" />
                  <ToggleTh show={showSupplies}     onToggle={() => setShowSupplies(v=>!v)}     label="Supplies"       width="20%" />
                  <ToggleTh show={showLastDone}     onToggle={() => setShowLastDone(v=>!v)}     label="Last Done"      width="6.5rem" />
                  <th className="no-print" style={{ width: "4rem" }} />
                </tr>
              </thead>
              <tbody>
                {allItems.length === 0 ? (
                  <tr>
                    <td colSpan={totalCols} className="text-center py-8 text-gray-300 text-xs italic">
                      No items yet — add one below
                    </td>
                  </tr>
                ) : (list || []).map((entry, topIdx) => {
                  if (entry.type === 'zone') {
                    const zoneItems = entry.items || [];
                    return (
                      <React.Fragment key={entry.id}>
                        {/* ── Zone header row ── */}
                        <tr
                          draggable
                          onDragStart={e => { e.dataTransfer.effectAllowed = "move"; setDragSrc({ kind: 'topZone', topIdx }); }}
                          onDragOver={e => { e.preventDefault(); setDragOver({ kind: 'zoneHeader', zoneId: entry.id, topIdx }); }}
                          onDrop={e => {
                            e.preventDefault();
                            if (dragSrc?.kind === 'topZone') {
                              if (dragSrc.topIdx !== topIdx) onReorderTopLevel(dragSrc.topIdx, topIdx);
                            } else if (dragSrc?.kind === 'topTask') {
                              onMoveTaskCross(dragSrc.id, entry.id);
                            } else if (dragSrc?.kind === 'zoneTask' && dragSrc.zoneId !== entry.id) {
                              onMoveTaskCross(dragSrc.id, entry.id);
                            }
                            clearDrag();
                          }}
                          onDragEnd={clearDrag}
                          className={`border-b border-gray-200 group/zone transition-all ${
                            dragSrc?.kind === 'topZone' && dragSrc.topIdx === topIdx ? "opacity-40 bg-slate-50" :
                            dragOver?.kind === 'zoneHeader' && dragOver.zoneId === entry.id && dragSrc?.kind !== 'topZone' ? "ring-inset ring-2 ring-blue-400 bg-blue-50/40" :
                            dragOver?.kind === 'zoneHeader' && dragOver.zoneId === entry.id ? "ring-inset ring-2 ring-blue-300" :
                            ""
                          }`}
                          style={{ backgroundColor: !(dragSrc?.kind === 'topZone' && dragSrc.topIdx === topIdx) ? '#f8fafc' : undefined }}
                        >
                          <td className="px-1 py-1 align-middle no-print" style={{ width: "1.5rem" }}>
                            <div className="flex justify-center cursor-grab active:cursor-grabbing text-gray-300 hover:text-gray-500 select-none" title="Drag to reorder zone">
                              <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 16 16">
                                <circle cx="5" cy="4" r="1.3"/><circle cx="11" cy="4" r="1.3"/>
                                <circle cx="5" cy="8" r="1.3"/><circle cx="11" cy="8" r="1.3"/>
                                <circle cx="5" cy="12" r="1.3"/><circle cx="11" cy="12" r="1.3"/>
                              </svg>
                            </div>
                          </td>
                          <td colSpan={totalCols - 1} className="px-2 py-1.5 align-middle">
                            <div className="flex items-center gap-2">
                              {/* Collapse toggle */}
                              <button
                                onClick={() => onToggleZone(entry.id)}
                                className="text-gray-400 hover:text-gray-700 flex-none transition-colors"
                                title={entry.collapsed ? "Expand zone" : "Collapse zone"}
                              >
                                <svg className={`w-3.5 h-3.5 transition-transform ${entry.collapsed ? "-rotate-90" : ""}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
                                </svg>
                              </button>
                              {/* Zone name */}
                              {editingZoneId === entry.id ? (
                                <input
                                  autoFocus
                                  value={editingZoneName}
                                  onChange={e => setEditingZoneName(e.target.value)}
                                  onBlur={commitZoneRename}
                                  onKeyDown={e => { if (e.key === "Enter") commitZoneRename(); if (e.key === "Escape") setEditingZoneId(null); }}
                                  className="text-xs font-bold border border-blue-300 rounded-lg px-2 py-0.5 focus:outline-none focus:ring-1 focus:ring-blue-400 bg-white min-w-24"
                                />
                              ) : (
                                <button
                                  onClick={() => { setEditingZoneId(entry.id); setEditingZoneName(entry.name); }}
                                  className="text-xs font-bold text-gray-600 hover:text-blue-600 uppercase tracking-wide"
                                  title="Click to rename zone"
                                >
                                  {entry.name}
                                </button>
                              )}
                              <span className="text-xs text-gray-400">{zoneItems.length} task{zoneItems.length !== 1 ? "s" : ""}</span>
                              <button
                                onClick={() => onAddItemToZone(entry.id)}
                                className="text-xs text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded px-1.5 py-0.5 transition-colors"
                                title="Add task to zone"
                              >+ task</button>
                              <button
                                onClick={() => requestConfirm(`Delete zone "${entry.name}"? Tasks inside will return to the list.`, () => onDeleteZone(entry.id))}
                                className="ml-auto text-gray-300 hover:text-red-500 hover:bg-red-50 rounded p-0.5 transition-colors opacity-0 group-hover/zone:opacity-100 text-xs"
                                title="Delete zone"
                              >✕</button>
                            </div>
                          </td>
                        </tr>
                        {/* ── Zone items ── */}
                        {!entry.collapsed && zoneItems.map((item, zIdx) => (
                          <ChecklistRow
                            key={item.id}
                            item={item}
                            idx={zIdx}
                            total={zoneItems.length}
                            employees={employees ?? []}
                            showHow={showHow}
                            showSecondaryHow={showSecondaryHow}
                            showFrequency={showFrequency}
                            showAssignee={showAssignee}
                            showTime={showTime}
                            showSupplies={showSupplies}
                            showPriority={showPriority}
                            showLastDone={showLastDone}
                            isInZone={true}
                            zones={zones}
                            onUpdate={(f, v) => onUpdate(item.id, f, v)}
                            onDelete={() => onDelete(item.id)}
                            onMoveUp={() => onMove(item.id, "up")}
                            onMoveDown={() => onMove(item.id, "down")}
                            onMoveToZone={targetZoneId => onMoveTaskToZone(item.id, targetZoneId)}
                            listKey={listKey}
                            onMoveToList={onMoveToList ? targetKey => onMoveToList(item.id, targetKey) : undefined}
                            isDragging={dragSrc?.kind === 'zoneTask' && dragSrc.zoneId === entry.id && dragSrc.zIdx === zIdx}
                            isDragOver={dragOver?.kind === 'zoneTask' && dragOver.zoneId === entry.id && dragOver.zIdx === zIdx && !(dragSrc?.kind === 'zoneTask' && dragSrc.zoneId === entry.id && dragSrc.zIdx === zIdx)}
                            onDragStart={e => { e.stopPropagation(); e.dataTransfer.effectAllowed = "move"; setDragSrc({ kind: 'zoneTask', zoneId: entry.id, zIdx, id: item.id }); }}
                            onDragOver={e => { e.preventDefault(); e.stopPropagation(); setDragOver({ kind: 'zoneTask', zoneId: entry.id, zIdx }); }}
                            onDrop={e => {
                              e.preventDefault(); e.stopPropagation();
                              if (!dragSrc) return;
                              if (dragSrc.kind === 'zoneTask') {
                                if (dragSrc.zoneId === entry.id) {
                                  if (dragSrc.zIdx !== zIdx) onReorderInZone(entry.id, dragSrc.zIdx, zIdx);
                                } else {
                                  onMoveTaskCross(dragSrc.id, entry.id, zIdx);
                                }
                              } else if (dragSrc.kind === 'topTask') {
                                onMoveTaskCross(dragSrc.id, entry.id, zIdx);
                              }
                              clearDrag();
                            }}
                            onDragEnd={clearDrag}
                          />
                        ))}
                        {/* Empty zone placeholder / drop target */}
                        {!entry.collapsed && zoneItems.length === 0 && (
                          <tr
                            className={`border-b border-gray-100 transition-colors ${dragOver?.kind === 'zoneDrop' && dragOver.zoneId === entry.id ? 'bg-blue-50' : ''}`}
                            onDragOver={e => { e.preventDefault(); setDragOver({ kind: 'zoneDrop', zoneId: entry.id }); }}
                            onDrop={e => {
                              e.preventDefault();
                              if (dragSrc?.kind === 'topTask') onMoveTaskCross(dragSrc.id, entry.id);
                              else if (dragSrc?.kind === 'zoneTask' && dragSrc.zoneId !== entry.id) onMoveTaskCross(dragSrc.id, entry.id);
                              clearDrag();
                            }}
                          >
                            <td colSpan={totalCols} className="py-2.5 text-center text-xs italic" style={{ color: dragOver?.kind === 'zoneDrop' && dragOver.zoneId === entry.id ? '#3b82f6' : '#d1d5db' }}>
                              {dragOver?.kind === 'zoneDrop' && dragOver.zoneId === entry.id ? '↓ Drop task here' : 'No tasks in this zone yet'}
                            </td>
                          </tr>
                        )}
                      </React.Fragment>
                    );
                  }
                  // ── Top-level task ──
                  return (
                    <ChecklistRow
                      key={entry.id}
                      item={entry}
                      idx={topIdx}
                      total={list.length}
                      employees={employees ?? []}
                      showHow={showHow}
                      showSecondaryHow={showSecondaryHow}
                      showFrequency={showFrequency}
                      showAssignee={showAssignee}
                      showTime={showTime}
                      showSupplies={showSupplies}
                      showPriority={showPriority}
                      showLastDone={showLastDone}
                      isInZone={false}
                      zones={zones}
                      onUpdate={(f, v) => onUpdate(entry.id, f, v)}
                      onDelete={() => onDelete(entry.id)}
                      onMoveUp={() => onMove(entry.id, "up")}
                      onMoveDown={() => onMove(entry.id, "down")}
                      onMoveToZone={targetZoneId => onMoveTaskToZone(entry.id, targetZoneId)}
                      listKey={listKey}
                      onMoveToList={onMoveToList ? targetKey => onMoveToList(entry.id, targetKey) : undefined}
                      isDragging={dragSrc?.kind === 'topTask' && dragSrc.topIdx === topIdx}
                      isDragOver={dragOver?.kind === 'topTask' && dragOver.topIdx === topIdx && !(dragSrc?.kind === 'topTask' && dragSrc.topIdx === topIdx)}
                      onDragStart={e => { e.dataTransfer.effectAllowed = "move"; setDragSrc({ kind: 'topTask', topIdx, id: entry.id }); }}
                      onDragOver={e => { e.preventDefault(); setDragOver({ kind: 'topTask', topIdx }); }}
                      onDrop={e => {
                        e.preventDefault();
                        if (!dragSrc) return;
                        if ((dragSrc.kind === 'topTask' || dragSrc.kind === 'topZone') && dragSrc.topIdx !== topIdx) {
                          onReorderTopLevel(dragSrc.topIdx, topIdx);
                        } else if (dragSrc.kind === 'zoneTask') {
                          onMoveTaskCross(dragSrc.id, null, topIdx);
                        }
                        clearDrag();
                      }}
                      onDragEnd={clearDrag}
                    />
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Add row + Add Zone */}
          <div className="p-2 border-t border-gray-100 no-print flex gap-2">
            <button
              onClick={onAdd}
              className={`flex-1 py-1.5 text-xs rounded-lg border border-dashed transition-colors ${c.add}`}
            >
              + Add Task
            </button>
            <button
              onClick={onAddZone}
              className="py-1.5 px-3 text-xs rounded-lg border border-dashed border-gray-300 text-gray-500 hover:bg-gray-50 hover:border-gray-400 transition-colors"
              title="Add a zone to group tasks"
            >
              + Add Zone
            </button>
          </div>
        </div>
      );
    }

    // ─── Custom Print Modal ───────────────────────────────────────────────────────
    function PrintModal({ loc, locData, onClose }) {
      const allRoomIds   = locData.rooms.map(r => r.id);
      const allEmployees = (locData.employees || []).map(e => e.name);

      const [employee, setEmployee]   = useState("All");
      const [rooms,    setRooms]      = useState(() => new Set(allRoomIds));
      const [lists,    setLists]      = useState(() => new Set(["restocking", "cleaning", "monthly"]));

      const toggleRoom = id  => setRooms(p  => { const n = new Set(p); n.has(id)  ? n.delete(id)  : n.add(id);  return n; });
      const toggleList = key => setLists(p  => { const n = new Set(p); n.has(key) ? n.delete(key) : n.add(key); return n; });

      // Live preview count
      const preview = React.useMemo(() => {
        let tasks = 0, roomCount = 0;
        locData.rooms.forEach(room => {
          if (!rooms.has(room.id)) return;
          let hit = false;
          LIST_META.forEach(({ key }) => {
            if (!lists.has(key)) return;
            flattenList(room[key] || []).forEach(item => {
              if (employee === "All" || item.assignee === employee) { tasks++; hit = true; }
            });
          });
          if (hit) roomCount++;
        });
        return { tasks, roomCount };
      }, [locData, rooms, lists, employee]);

      const doPrint = () => {
        const esc   = s => (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/\n/g,"<br>");
        const date  = new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });
        const who   = employee === "All" ? "All Staff" : employee;
        const color = { restocking:"#f59e0b", cleaning:"#10b981", monthly:"#8b5cf6" };

        const makeRow = (task, indent) => `
          <tr${indent ? ' class="zindent"' : ''}>
            <td class="cb"><span class="chk"></span></td>
            <td class="task">${esc(task.task)}</td>
            <td>${esc(task.details)}</td>
            <td>${esc(task.how)}</td>
            <td>${esc(task.secondaryHow)}</td>
            <td class="narrow">${esc(task.time)}</td>
            <td>${esc(task.supplies)}</td>
          </tr>`;

        let sections = "";
        locData.rooms.forEach(room => {
          if (!rooms.has(room.id)) return;
          let roomHtml = "";
          LIST_META.forEach(({ key, label }) => {
            if (!lists.has(key)) return;
            let bodyHtml = ""; let taskCount = 0;
            (room[key] || []).forEach(entry => {
              if (entry.type === "zone") {
                let zRows = ""; let zCount = 0;
                entry.items.forEach(t => {
                  if (employee !== "All" && t.assignee !== employee) return;
                  zRows += makeRow(t, true); zCount++; taskCount++;
                });
                if (zCount > 0) bodyHtml += `<tr class="zone-hdr"><td colspan="5">▸ ${esc(entry.name)}</td></tr>${zRows}`;
              } else {
                if (employee !== "All" && entry.assignee !== employee) return;
                bodyHtml += makeRow(entry, false); taskCount++;
              }
            });
            if (taskCount === 0) return;
            roomHtml += `

      const rows = items.length

    const LIST_META = [

    // ─── LocationDashboard ───────────────────────────────────────────────────────
    function LocationDashboard({ loc, locData, locColor, onSelectRoom }) {
      const rooms = locData.rooms;
      const employees = locData.employees ?? [];

      // Flatten all items per list type across every room
      const byType = {
        restocking: rooms.flatMap(r => flattenList(r.restocking)),
        cleaning:   rooms.flatMap(r => flattenList(r.cleaning)),
        monthly:    rooms.flatMap(r => flattenList(r.monthly)),
      };
      const allItems = [...byType.restocking, ...byType.cleaning, ...byType.monthly];
      const totalTasks = allItems.length;

      // Time totals per list type
      const timeByType = {
        restocking: byType.restocking.reduce((s, i) => s + parseMinutes(i.time), 0),
        cleaning:   byType.cleaning.reduce((s, i)   => s + parseMinutes(i.time), 0),
        monthly:    byType.monthly.reduce((s, i)     => s + parseMinutes(i.time), 0),
      };

      // Assignment breakdown
      const assignMap = {};
      allItems.forEach(i => {
        const k = i.assignee?.trim() || "Unassigned";
        assignMap[k] = (assignMap[k] || 0) + 1;
      });
      const assignments = Object.entries(assignMap).sort((a, b) => {
        if (a[0] === "Unassigned") return 1;
        if (b[0] === "Unassigned") return -1;
        return b[1] - a[1];
      });

      // Priority breakdown
      const priorityCounts = PRIORITY_OPTIONS.map(p => ({
        label: p,
        count: allItems.filter(i => i.priority === p).length,
      }));

      // Frequency breakdown — always show all canonical options in order
      const FREQ_COLORS = {
        "Weekly":    "bg-sky-100 text-sky-700 border-sky-200",
        "Bi-Weekly": "bg-cyan-100 text-cyan-700 border-cyan-200",
        "Monthly":   "bg-violet-100 text-violet-700 border-violet-200",
        "Quarterly": "bg-indigo-100 text-indigo-700 border-indigo-200",
        "Yearly":    "bg-pink-100 text-pink-700 border-pink-200",
        "As Needed": "bg-amber-100 text-amber-700 border-amber-200",
      };
      const freqMap = {};
      allItems.forEach(i => {
        const k = i.frequency?.trim();
        if (k) freqMap[k] = (freqMap[k] || 0) + 1;
      });
      // Build list in canonical order, always including all six options
      const frequencies = FREQUENCY_OPTIONS.map(opt => [opt, freqMap[opt] || 0]);

      // LIST_META is defined at module level above

      const [dashSearch, setDashSearch] = useState("");

      const searchIndex = React.useMemo(() => rooms.flatMap(room =>
        LIST_META.flatMap(({ key, label, pill }) =>
          flattenList(room[key] || []).map(item => ({ ...item, roomName: room.name, roomId: room.id, category: label, categoryPill: pill }))
        )
      ), [rooms]);

      const searchResults = React.useMemo(() => {
        const q = dashSearch.trim().toLowerCase();
        if (!q) return [];
        return searchIndex.filter(item =>
          [item.task, item.details, item.how, item.secondaryHow, item.roomName].some(f => (f||"").toLowerCase().includes(q))
        );
      }, [dashSearch, searchIndex]);

      const Highlight = ({ text }) => {
        const q = dashSearch.trim();
        if (!q || !text) return <>{text || ""}</>;
        const idx = text.toLowerCase().indexOf(q.toLowerCase());
        if (idx === -1) return <>{text}</>;
        return <>{text.slice(0, idx)}<mark className="bg-yellow-200 text-yellow-900 rounded-sm px-0.5 not-italic">{text.slice(idx, idx + q.length)}</mark>{text.slice(idx + q.length)}</>;

              <input
                value={dashSearch}
                onChange={e => setDashSearch(e.target.value)}
                placeholder="Search all tasks in this location…"
                className={`w-full text-xs border rounded-xl pl-9 pr-8 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all placeholder-gray-300 ${dashSearch ? "border-blue-300 bg-white shadow-sm" : "border-gray-200 bg-gray-50 hover:bg-white hover:border-gray-300"}`}
              />
              {dashSearch && (
                <button onClick={() => setDashSearch("")} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg leading-none">×</button>
              )}
            </div>
          </div>

          {dashSearch.trim() ? (
            /* ── Search results ── */
            <div>
              <div className="flex items-center justify-between mb-3">
                <p className="text-sm font-semibold text-gray-600">
                  <span className="text-lg font-extrabold text-gray-800 mr-1">{searchResults.length}</span>
                  result{searchResults.length !== 1 ? "s" : ""}
                  {searchResults.length > 0 && <> for "<span className="text-blue-600">{dashSearch}</span>"</>}

                <button onClick={() => setDashSearch("")} className="text-xs text-gray-400 hover:text-gray-600 font-medium px-2 py-1 rounded-lg hover:bg-gray-100 transition-colors">

              </div>
              {searchResults.length === 0 ? (
                <div className="text-center py-16">
                  <div className="text-4xl mb-3 opacity-20">🔍</div>

                  <p className="text-xs text-gray-300 mt-1">Try different keywords</p>

              ) : (
                <div className="space-y-2">
                  {searchResults.map(item => (
                    <button
                      key={item.id}
                      onClick={() => onSelectRoom(item.roomId)}

                        </svg>
                      </div>

            {LIST_META.map(({ key, label, bar, text }) => {

                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>

              <div className="flex gap-6">
                {priorityCounts.map(({ label, count }) => {

                  return (
                    <div key={label} className="flex-1">
                      <div className="flex items-center gap-2 mb-1.5">
                        <span className={`text-xs font-bold px-2.5 py-0.5 rounded-full border ${ps.pill}`}>{label}</span>
                        <span className="text-xs font-bold text-gray-600 ml-auto">{count}</span>

    // ─── Export / Import ─────────────────────────────────────────────────────────
    const triggerDownload = (blob, filename) => {
      const url = URL.createObjectURL(blob);
      const a   = document.createElement("a");
      a.href    = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();

    // Shared CSV builder — used by Export CSV button AND Google Sheets auto-sync
    const buildCSV = (data) => {
      const headers = ["Location","Room","Category","Task","Details","How?","Secondary How","Frequency","Priority","Assignee","Time Est.","Supplies","Completed","Last Done"];
      const rows = [headers];
      LOCATIONS.forEach(loc => {
        const ld = data[loc];
        if (!ld) return;
        ld.rooms.forEach(room => {
          [["restocking","Restocking"],["cleaning","Cleaning"],["monthly","Monthly"]].forEach(([key, label]) => {
            flattenList(room[key] || []).forEach(item => {
              rows.push([
                loc, room.name, label,
                item.task || "", item.details || "", item.how || "", item.secondaryHow || "",
                item.frequency || "", item.priority || "", item.assignee || "",
                item.time || "", item.supplies || "", item.completed ? "Yes" : "No", item.lastCompleted || ""
              ]);
            });
          });
        });
      });
      const esc = s => `"${String(s).replace(/"/g,'""')}"`;
      return rows.map(r => r.map(esc).join(",")).join("\r\n");
    };

    const exportCSV = (data) => {
      const date = new Date().toISOString().slice(0,10);
      triggerDownload(new Blob(["\uFEFF"+buildCSV(data)], { type:"text/csv;charset=utf-8;" }), `house-manager-checklists-${date}.csv`);
    };

    const exportJSON = (data) => {

    };

    // ─── CSV Import Parser ────────────────────────────────────────────────────────
    const parseCSVRows = (text) => {
      const parseRow = (line) => {
        const cells = []; let cur = '', inQ = false;
        for (let i = 0; i < line.length; i++) {
          const c = line[i];
          if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
          else if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
          else cur += c;
        }
        cells.push(cur.trim());
        return cells;
      };
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) return [];
      const headers = parseRow(lines[0]).map(h => h.replace(/^"|"$/g, '').toLowerCase().trim());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const cells = parseRow(line).map(c => c.replace(/^"|"$/g, ''));
        const obj = {};
        headers.forEach((h, i) => { obj[h] = cells[i] ?? ''; });
        return obj;
      });
    };

    const getField = (row, ...candidates) => {
      for (const c of candidates) {
        const val = row[c.toLowerCase()];
        if (val !== undefined && val !== '') return val;
      }
      return '';
    };

    const parseImportCSV = (text, currentLoc) => {
      const rows = parseCSVRows(text);
      if (rows.length === 0) return { rooms: [], errors: ['No data found in file'], warnings: [], skipped: 0 };

      const errors = [], warnings = [];
      let skipped = 0;
      const roomMap = {};

      rows.forEach((row, i) => {
        const rowNum = i + 2;
        const rowLoc = getField(row, 'location');
        if (rowLoc && rowLoc.toLowerCase() !== currentLoc.toLowerCase()) { skipped++; return; }

        const roomName = getField(row, 'room', 'room/area', 'area', 'room name', 'roomarea').trim();
        if (!roomName) { warnings.push(`Row ${rowNum}: missing Room — skipped`); return; }

        const catRaw = getField(row, 'category', 'type', 'list', 'list type').toLowerCase().trim();
        let category = 'restocking';
        if (catRaw.includes('clean')) category = 'cleaning';
        else if (catRaw.includes('month')) category = 'monthly';
        else if (!catRaw || catRaw.includes('restock')) category = 'restocking';
        else { warnings.push(`Row ${rowNum}: unknown category "${catRaw}" — defaulted to Restocking`); }

        const task = getField(row, 'task', 'task name', 'name', 'item').trim();
        if (!task) { warnings.push(`Row ${rowNum}: missing Task — skipped`); return; }

        const freqRaw = getField(row, 'frequency', 'freq').trim();
        const FREQ_NORM = { 'weekly':'Weekly','bi-weekly':'Bi-Weekly','biweekly':'Bi-Weekly','bi weekly':'Bi-Weekly','monthly':'Monthly','quarterly':'Quarterly','yearly':'Yearly','as needed':'As Needed','as-needed':'As Needed','asneeded':'As Needed' };
        const frequency = FREQ_NORM[freqRaw.toLowerCase()] || freqRaw;

        const priRaw = getField(row, 'priority', 'pri').trim();
        const PRI_NORM = { 'high':'High','medium':'Medium','med':'Medium','low':'Low','h':'High','m':'Medium','l':'Low' };
        const priority = PRI_NORM[priRaw.toLowerCase()] || priRaw;

        const item = {
          id: uid(),
          task,
          details:      getField(row, 'details', 'detail', 'description', 'desc').trim(),
          how:          getField(row, 'how?', 'how', 'how-to', 'howto', 'how to', 'primary how').trim(),
          secondaryHow: getField(row, 'secondary how?', 'secondary how', 'secondary', 'notes', 'note').trim(),
          frequency,
          priority,
          assignee:     getField(row, 'assignee', 'assigned to', 'who', 'assign').trim(),
          time:         getField(row, 'time est.', 'time est', 'time', 'duration', 'time estimate').trim(),
          supplies:      getField(row, 'supplies', 'supply', 'materials', 'items needed').trim(),
          completed: false,
          lastCompleted: getField(row, 'last done', 'last completed', 'lastcompleted', 'lastdone', 'last done date').trim(),
        };

        const key = roomName.toLowerCase();
        if (!roomMap[key]) roomMap[key] = { name: roomName, restocking: [], cleaning: [], monthly: [] };
        roomMap[key][category].push(item);
      });

      return { rooms: Object.values(roomMap), errors, warnings, skipped };
    };

    // ─── Google Sheets Sync ───────────────────────────────────────────────────────
    const SHEETS_KEY = "housemanager_sheets_url";

    const syncToSheets = async (data, url, trigger = "Auto") => {

          body: JSON.stringify({ csv: buildCSV(data), trigger, ts: new Date().toISOString() }),

        return true;
      } catch (e) { return false; }
    };
