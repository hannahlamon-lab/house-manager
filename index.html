                className="px-5 py-2 text-xs font-semibold bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                Save &amp; Sync Now
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── ConfirmModal ────────────────────────────────────────────────────────────
    function ConfirmModal({ message, onConfirm, onCancel }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
             onClick={e => { if (e.target === e.currentTarget) onCancel(); }}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden">
            <div className="px-5 py-5 flex items-start gap-3.5">
              <div className="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center flex-none mt-0.5">
                <svg className="w-5 h-5 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
              </div>
              <div>
                <p className="font-bold text-gray-800 text-sm mb-1">Confirm Delete</p>
                <p className="text-xs text-gray-500 leading-relaxed">{message}</p>
              </div>
            </div>
            <div className="px-5 py-3 bg-gray-50 border-t border-gray-100 flex items-center justify-end gap-2">
              <button
                onClick={onCancel}
                className="px-4 py-2 text-xs font-medium bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-600 shadow-sm transition-colors"
              >
                Cancel
              </button>
              <button
                onClick={onConfirm}
                className="px-4 py-2 text-xs font-semibold bg-red-600 text-white rounded-xl hover:bg-red-700 shadow-sm transition-colors"
              >
                Yes, Delete
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── FilterBar ───────────────────────────────────────────────────────────────
    function FilterBar({ allItems, employees, text, priority, frequency, status, assignee, onText, onPriority, onFrequency, onStatus, onAssignee, onClear }) {
      const hasFilters = text || priority !== "All" || frequency !== "All" || status !== "all" || assignee !== "All";

      // Build assignee list from employees + any assignee values already in data
      const assigneeOptions = React.useMemo(() => {
        const names = new Set([
          ...employees.map(e => e.name),
          ...allItems.map(i => i.assignee).filter(Boolean),
        ]);
        return ["All", ...[...names].sort()];
      }, [employees, allItems]);

      const filteredCount = allItems.filter(item => {
        if (text) {
          const t = text.toLowerCase();
          if (![item.task, item.details, item.how, item.secondaryHow].some(f => (f||"").toLowerCase().includes(t))) return false;
        }
        if (priority  !== "All" && item.priority  !== priority)  return false;
        if (frequency !== "All" && item.frequency !== frequency) return false;
        if (assignee  !== "All" && item.assignee  !== assignee)  return false;
        if (status === "complete"   && !item.completed)                    return false;
        if (status === "incomplete" && (item.completed || item.notNeeded)) return false;
        if (status === "not-needed" && !item.notNeeded)                    return false;
        if (status === "prv-inc"    && !item.prevIncomplete)               return false;
        return true;
      }).length;

      const selClass = "text-xs border rounded-lg px-2.5 py-1.5 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 cursor-pointer transition-colors " + (hasFilters ? "border-blue-200 text-gray-700 hover:border-blue-300" : "border-gray-200 text-gray-600 hover:border-gray-300");

      return (
        <div className={`no-print flex items-center gap-2 flex-wrap mb-4 px-3 py-2.5 rounded-xl border transition-colors ${hasFilters ? "bg-blue-50/40 border-blue-200" : "bg-gray-50 border-gray-200"}`}>

          {/* Text search */}
          <div className="relative flex-1 min-w-40">
            <svg className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input
              value={text}
              onChange={e => onText(e.target.value)}
              placeholder="Search tasks, details, notes…"
              className={`w-full text-xs border rounded-lg pl-8 pr-7 py-1.5 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400 placeholder-gray-300 transition-colors ${text ? "border-blue-300 text-gray-800" : "border-gray-200 text-gray-700"}`}
            />
            {text && (
              <button onClick={() => onText("")} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-300 hover:text-gray-600 text-base leading-none">×</button>
            )}
          </div>

          {/* Priority */}
          <select value={priority} onChange={e => onPriority(e.target.value)} className={selClass}>
            <option value="All">All Priorities</option>
            {PRIORITY_OPTIONS.map(p => <option key={p} value={p}>{p}</option>)}
          </select>

          {/* Frequency */}
          <select value={frequency} onChange={e => onFrequency(e.target.value)} className={selClass}>
            <option value="All">All Frequencies</option>
            {FREQUENCY_OPTIONS.map(f => <option key={f} value={f}>{f}</option>)}
          </select>

          {/* Status */}
          <select value={status} onChange={e => onStatus(e.target.value)} className={selClass}>
            <option value="all">All Statuses</option>
            <option value="incomplete">Incomplete</option>
            <option value="complete">Complete ✓</option>
            <option value="not-needed">Not Needed △</option>
            <option value="prv-inc">PRV INC</option>
          </select>

          {/* Assignee — only show if there are options */}
          {assigneeOptions.length > 1 && (
            <select value={assignee} onChange={e => onAssignee(e.target.value)} className={selClass}>
              {assigneeOptions.map(a => <option key={a} value={a}>{a === "All" ? "All Assignees" : a}</option>)}
            </select>
          )}

          {/* Active filter feedback */}
          {hasFilters && (
            <>
              <span className="text-xs font-semibold text-blue-600 px-1 whitespace-nowrap">
                {filteredCount} / {allItems.length} shown
              </span>
              <button
                onClick={onClear}
                className="text-xs font-medium text-gray-400 hover:text-red-500 px-2 py-1 rounded-lg hover:bg-red-50 transition-colors whitespace-nowrap"
              >
                Clear all
              </button>
            </>
          )}
        </div>
      );
    }

    // ─── ImportModal ─────────────────────────────────────────────────────────────
    function ImportModal({ loc, existingRooms, onImport, onClose }) {
      const [step, setStep] = useState('upload');
      const [parsed, setParsed] = useState(null);
      const [mode, setMode] = useState('append');
      const [dragging, setDragging] = useState(false);
      const fileRef = React.useRef();

      const processFile = (file) => {
        if (!file) return;
        if (!file.name.match(/\.(csv|txt)$/i)) { alert('Please upload a .csv file'); return; }
        const reader = new FileReader();
        reader.onload = (ev) => { setParsed(parseImportCSV(ev.target.result, loc)); setStep('preview'); };
        reader.readAsText(file);
      };

      const totalTasks = parsed ? parsed.rooms.reduce((s, r) => s + r.restocking.length + r.cleaning.length + r.monthly.length, 0) : 0;
      const newRooms    = parsed ? parsed.rooms.filter(r => !existingRooms.find(e => e.name.toLowerCase() === r.name.toLowerCase())) : [];
      const mergeRooms  = parsed ? parsed.rooms.filter(r =>  existingRooms.find(e => e.name.toLowerCase() === r.name.toLowerCase())) : [];

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
             onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 flex flex-col overflow-hidden" style={{ maxHeight: '90vh' }}>

            {/* Header */}
            <div className="flex items-center justify-between px-5 py-4 bg-indigo-600 flex-none">
              <div>
                <p className="text-white font-bold text-sm tracking-wide">Import Data</p>
                <p className="text-indigo-200 text-xs mt-0.5">{loc}</p>
              </div>
              <button onClick={onClose} className="p-1.5 rounded-lg text-indigo-200 hover:text-white hover:bg-indigo-500 transition-colors">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>

            {/* Step 1 — Upload */}
            {step === 'upload' && (
              <>
                <div className="p-6 flex-1 overflow-y-auto">
                  <div
                    onDragOver={e => { e.preventDefault(); setDragging(true); }}
                    onDragLeave={() => setDragging(false)}
                    onDrop={e => { e.preventDefault(); setDragging(false); processFile(e.dataTransfer.files[0]); }}
                    onClick={() => fileRef.current?.click()}
                    className={`border-2 border-dashed rounded-2xl p-10 text-center cursor-pointer transition-all ${dragging ? 'border-indigo-400 bg-indigo-50' : 'border-gray-200 hover:border-indigo-300 hover:bg-indigo-50/50'}`}
                  >
                    <div className="w-12 h-12 mx-auto mb-3 rounded-xl bg-indigo-100 flex items-center justify-center">
                      <svg className="w-6 h-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                      </svg>
                    </div>
                    <p className="text-sm font-semibold text-gray-700 mb-1">Drop a CSV file here</p>
                    <p className="text-xs text-gray-400">or click to browse</p>
                    <input ref={fileRef} type="file" accept=".csv,.txt" className="hidden"
                           onChange={e => { processFile(e.target.files[0]); e.target.value = ''; }} />
                  </div>

                  <div className="mt-5 bg-gray-50 rounded-xl p-4">
                    <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">Accepted CSV Columns</p>
                    <div className="grid grid-cols-2 gap-x-6 gap-y-1.5">
                      {[
                        ['Room',       'Required — room or area name'],
                        ['Category',   'Restocking / Cleaning / Monthly'],
                        ['Task',       'Required — task name'],
                        ['Details',    'Where / what exactly'],
                        ['How-To',     'Secondary how / notes'],
                        ['Frequency',  'Weekly, Monthly, Quarterly…'],
                        ['Priority',   'High / Medium / Low'],
                        ['Assignee',   "Person's name"],
                        ['Time Est.',  'e.g. 15 min, 1hr'],
                        ['Location',   'Optional — filters to current location'],
                      ].map(([col, desc]) => (
                        <div key={col} className="flex items-baseline gap-2">
                          <span className="text-xs font-semibold text-indigo-700 font-mono w-24 flex-none">{col}</span>
                          <span className="text-xs text-gray-500">{desc}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="px-5 py-3 border-t border-gray-100 bg-gray-50 flex-none flex justify-end">
                  <button onClick={onClose} className="px-4 py-2 text-xs font-medium bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-500 shadow-sm transition-colors">Cancel</button>
                </div>
              </>
            )}

            {/* Step 2 — Preview */}
            {step === 'preview' && parsed && (
              <>
                <div className="flex-1 overflow-y-auto p-5 space-y-4">

                  {/* Summary bar */}
                  <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4 flex items-center gap-5 flex-wrap">
                    {[
                      { val: parsed.rooms.length,  label: 'rooms',    color: 'text-indigo-700' },
                      { val: totalTasks,            label: 'tasks',    color: 'text-indigo-700' },
                      { val: newRooms.length,       label: 'new rooms',color: 'text-green-600'  },
                      ...(mergeRooms.length ? [{ val: mergeRooms.length, label: 'existing rooms', color: 'text-amber-600' }] : []),
                      ...(parsed.skipped   ? [{ val: parsed.skipped,    label: 'skipped (other location)', color: 'text-gray-400' }] : []),
                    ].map(({ val, label, color }, i, arr) => (
                      <React.Fragment key={label}>
                        <div className="text-center">
                          <p className={`text-2xl font-extrabold ${color}`}>{val}</p>
                          <p className={`text-xs ${color} opacity-80`}>{label}</p>
                        </div>
                        {i < arr.length - 1 && <div className="w-px h-10 bg-indigo-200 flex-none" />}
                      </React.Fragment>
                    ))}
                  </div>

                  {/* Mode toggle — only if there are matching existing rooms */}
                  {mergeRooms.length > 0 && (
                    <div className="bg-white border border-gray-200 rounded-xl p-4">
                      <p className="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">For existing rooms:</p>
                      <div className="flex gap-2">
                        {/* Append — default safe option */}
                        <button onClick={() => setMode('append')}
                          className={`flex-1 text-left p-3 rounded-xl border-2 transition-all ${mode === 'append' ? 'border-emerald-400 bg-emerald-50' : 'border-gray-200 hover:border-emerald-200'}`}>
                          <div className="flex items-center gap-1.5 mb-0.5">
                            <svg className={`w-3.5 h-3.5 flex-none ${mode === 'append' ? 'text-emerald-600' : 'text-gray-400'}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 4v16m8-8H4"/>
                            </svg>
                            <p className={`text-xs font-bold ${mode === 'append' ? 'text-emerald-700' : 'text-gray-700'}`}>Append tasks</p>
                            {mode === 'append' && <span className="ml-auto text-[10px] font-bold bg-emerald-200 text-emerald-800 px-1.5 py-0.5 rounded-full">Recommended</span>}
                          </div>
                          <p className="text-xs text-gray-400">Add imported tasks alongside existing ones — nothing is removed</p>
                        </button>

                        {/* Replace — destructive, visually alarming */}
                        <button onClick={() => setMode('replace-rooms')}
                          className={`flex-1 text-left p-3 rounded-xl border-2 transition-all ${mode === 'replace-rooms' ? 'border-red-500 bg-red-50' : 'border-red-200 bg-red-50/40 hover:border-red-400'}`}>
                          <div className="flex items-center gap-1.5 mb-0.5">
                            <svg className="w-3.5 h-3.5 flex-none text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                            </svg>
                            <p className="text-xs font-bold text-red-700">Replace tasks</p>
                            <span className="ml-auto text-[10px] font-bold bg-red-200 text-red-800 px-1.5 py-0.5 rounded-full">Destructive</span>
                          </div>
                          <p className="text-xs text-red-400">Deletes all existing tasks in matching rooms before importing</p>
                        </button>
                      </div>

                      {/* Extra warning when Replace is active */}
                      {mode === 'replace-rooms' && (
                        <div className="mt-3 flex items-start gap-2 px-3 py-2.5 bg-red-100 border border-red-300 rounded-xl">
                          <svg className="w-4 h-4 text-red-600 flex-none mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                          </svg>
                          <p className="text-xs font-semibold text-red-700">
                            <span className="font-black">Warning:</span> This will permanently delete all existing tasks in any room that matches your import. This cannot be undone. Consider downloading a JSON backup first.
                          </p>
                        </div>
                      )}
                    </div>
                  )}

                  {/* Room preview list */}
                  <div>
                    <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Room Preview</p>
                    <div className="space-y-2">
                      {parsed.rooms.map(room => {
                        const isNew  = !existingRooms.find(e => e.name.toLowerCase() === room.name.toLowerCase());
                        const total  = room.restocking.length + room.cleaning.length + room.monthly.length;
                        return (
                          <div key={room.name} className="bg-white border border-gray-200 rounded-xl p-3 flex items-center gap-3">
                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full flex-none ${isNew ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
                              {isNew ? 'NEW' : 'EXISTING'}
                            </span>
                            <p className="text-sm font-semibold text-gray-800 flex-1 min-w-0 truncate">{room.name}</p>
                            <div className="flex gap-1.5 items-center text-xs flex-none">
                              {room.restocking.length > 0 && <span className="bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-semibold">{room.restocking.length}R</span>}
                              {room.cleaning.length   > 0 && <span className="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-semibold">{room.cleaning.length}C</span>}
                              {room.monthly.length    > 0 && <span className="bg-violet-100 text-violet-700 px-2 py-0.5 rounded-full font-semibold">{room.monthly.length}M</span>}
                              <span className="text-gray-400 pl-1">{total} tasks</span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Warnings */}
                  {parsed.warnings?.length > 0 && (
                    <div className="bg-amber-50 border border-amber-200 rounded-xl p-4">
                      <p className="text-xs font-bold text-amber-700 mb-2">Warnings ({parsed.warnings.length})</p>
                      <ul className="space-y-1">{parsed.warnings.map((w, i) => <li key={i} className="text-xs text-amber-700">• {w}</li>)}</ul>
                    </div>
                  )}

                  {/* Errors */}
                  {parsed.errors?.length > 0 && (
                    <div className="bg-red-50 border border-red-200 rounded-xl p-4">
                      <p className="text-xs font-bold text-red-700 mb-2">Errors ({parsed.errors.length})</p>
                      <ul className="space-y-1">{parsed.errors.map((e, i) => <li key={i} className="text-xs text-red-700">• {e}</li>)}</ul>
                    </div>
                  )}

                  {parsed.rooms.length === 0 && (
                    <div className="text-center py-8">
                      <p className="text-sm text-gray-500 font-semibold">No importable rows found</p>
                      <p className="text-xs text-gray-400 mt-1">Make sure your CSV has Room and Task columns, and that the Location column (if present) matches "{loc}"</p>
                    </div>
                  )}
                </div>

                <div className="px-5 py-3 border-t border-gray-100 bg-gray-50 flex-none flex items-center justify-between">
                  <button onClick={() => { setStep('upload'); setParsed(null); }}
                    className="px-4 py-2 text-xs font-medium bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-500 shadow-sm transition-colors">
                    ← Back
                  </button>
                  <div className="flex gap-2">
                    <button onClick={onClose} className="px-4 py-2 text-xs font-medium bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-500 shadow-sm transition-colors">Cancel</button>
                    <button
                      onClick={() => { onImport(parsed.rooms, mode); onClose(); }}
                      disabled={parsed.rooms.length === 0}
                      className="px-5 py-2 text-xs font-semibold bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 shadow-sm disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                      Import {totalTasks} Task{totalTasks !== 1 ? 's' : ''}
                    </button>
                  </div>
                </div>
              </>
            )}

          </div>
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────────────────
    function App() {
      const [data, setData] = useState(loadData);
      const [loc, setLoc] = useState(LOCATIONS[0]);
      const [roomId, setRoomId] = useState(() => {
        const d = loadData();
        return d["The Park House"]?.rooms[0]?.id ?? null;
      });

      const [saveError, setSaveError] = useState(false);
      const [lastSaved, setLastSaved] = useState(null);

      // Persist all data changes to localStorage automatically
      useEffect(() => {
        if (saveData(data)) { setSaveError(false); setLastSaved(new Date()); }
        else setSaveError(true);
      }, [data]);

      // ── Weekly reset: prompt user instead of auto-resetting ───────────────────
      const [resetDue, setResetDue] = useState(() => {
        const lastReset = parseInt(localStorage.getItem(RESET_KEY) || "0");
        return lastReset < getThisMondayMidnight();
      });

      const doWeeklyReset = () => {
        const resetItem = (item) => ({
          ...item,
          prevIncomplete: !item.completed && !item.notNeeded,
          completed: false, notNeeded: false,
        });
        const resetList = (list) => list.map(e =>
          e.type === 'zone' ? { ...e, items: e.items.map(resetItem) } : resetItem(e)
        );
        setData(prev => {
          const next = {};
          LOCATIONS.forEach(l => {
            const ld = prev[l];
            next[l] = {
              ...ld,
              rooms: ld.rooms.map(room => ({
                ...room,
                restocking: resetList(room.restocking),
                cleaning:   resetList(room.cleaning),
                monthly:    resetList(room.monthly),
              })),
            };
          });
          return next;
        });
        localStorage.setItem(RESET_KEY, Date.now().toString());
        setResetDue(false);
      };

      // ── Weekly log: save a timestamped snapshot of a list ────────────────────
      const [saveToast, setSaveToast] = useState(null); // { roomName, listLabel }

      const saveWeeklyLog = (roomName, listKey, listLabel, items) => {
        const entry = {
          id: uid(),
          savedAt: new Date().toISOString(),
          weekStart: getThisMondayMidnight(),
          location: loc,
          room: roomName,
          list: listKey,
          listLabel,
          items: flattenList(items),
        };
        try {
          const existing = JSON.parse(localStorage.getItem(LOG_KEY) || "[]");
          existing.push(entry);
          if (existing.length > 200) existing.splice(0, existing.length - 200);
          localStorage.setItem(LOG_KEY, JSON.stringify(existing));
        } catch (e) {}
        setSaveToast({ roomName, listLabel });
        setTimeout(() => setSaveToast(null), 2500);
      };
      const [view, setView] = useState("restocking");
      const [addingRoom,   setAddingRoom]   = useState(false);
      const [newRoomName,  setNewRoomName]  = useState("");
      const [editingRoom,  setEditingRoom]  = useState(null); // { id, name }
      const [showSettings,    setShowSettings]    = useState(false);
      const [showSheetsModal, setShowSheetsModal] = useState(false);
      const [sheetsUrl,       setSheetsUrl]       = useState(() => localStorage.getItem(SHEETS_KEY) || "");
      const [sheetsSyncing,   setSheetsSyncing]   = useState(false);
      const [sheetsLastSync,  setSheetsLastSync]  = useState(null);
      const [showImportModal, setShowImportModal] = useState(false);
      const [showPrintModal,  setShowPrintModal]  = useState(false);
      const [dragRoomIdx,     setDragRoomIdx]     = useState(null);
      const [dragOverRoomIdx, setDragOverRoomIdx] = useState(null);
      const [confirmState,    setConfirmState]    = useState(null); // { message, onConfirm }
      const [filterText,      setFilterText]      = useState("");
      const [filterPriority,  setFilterPriority]  = useState("All");
      const [filterFrequency, setFilterFrequency] = useState("All");
      const [filterStatus,    setFilterStatus]    = useState("all");
      const [filterAssignee,  setFilterAssignee]  = useState("All");
      const importRef = React.useRef();

      // ── Google Sheets auto-sync every 30 min ─────────────────────────────────
      const handleSheetsSync = React.useCallback(async (trigger = "Manual") => {
        if (!sheetsUrl) return;
        setSheetsSyncing(true);
        await syncToSheets(data, sheetsUrl, trigger);
        setSheetsLastSync(new Date());
        setSheetsSyncing(false);
      }, [sheetsUrl, data]);

      useEffect(() => {
        if (!sheetsUrl) return;
        handleSheetsSync("Auto");
        const interval = setInterval(() => handleSheetsSync("Auto"), 30 * 60 * 1000);
        return () => clearInterval(interval);
      }, [sheetsUrl, handleSheetsSync]); // re-runs when URL or callback changes (avoids stale closure)

      const handleImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = JSON.parse(ev.target.result);
            const valid = LOCATIONS.every(l => parsed[l] && Array.isArray(parsed[l].rooms));
            if (!valid) { alert("Invalid backup file — please use a .json file exported from this app."); return; }
            if (window.confirm("Restore from backup? This will replace all current data.")) {
              setData(parsed);
              saveData(parsed);
              setRoomId(null);
            }
          } catch { alert("Could not read file. Please use a valid .json backup."); }
          e.target.value = "";
        };
        reader.readAsText(file);
      };

      // ── Derived ─────────────────────────────────────────────────
      const locData = data[loc];
      const room = locData.rooms.find(r => r.id === roomId) ?? null;
      const locColor = LOCATION_COLORS[loc];

      // ── Data helpers ─────────────────────────────────────────────
      const resetFilters = () => {
        setFilterText(""); setFilterPriority("All"); setFilterFrequency("All");
        setFilterStatus("all"); setFilterAssignee("All");
      };

      const applyFilters = (list) => {
        const filterItem = (item) => {
          if (filterText) {
            const t = filterText.toLowerCase();
            if (![item.task, item.details, item.how, item.secondaryHow].some(f => (f||"").toLowerCase().includes(t))) return false;
          }
          if (filterPriority  !== "All"  && item.priority  !== filterPriority)  return false;
          if (filterFrequency !== "All"  && item.frequency !== filterFrequency) return false;
          if (filterAssignee  !== "All"  && item.assignee  !== filterAssignee)  return false;
          if (filterStatus === "complete"   && !item.completed)                       return false;
          if (filterStatus === "incomplete" && (item.completed || item.notNeeded))    return false;
          if (filterStatus === "not-needed" && !item.notNeeded)                       return false;
          if (filterStatus === "prv-inc"    && !item.prevIncomplete)                  return false;
          return true;
        };
        return (list || []).flatMap(e => {
          if (e.type === 'zone') {
            const filteredItems = e.items.filter(filterItem);
            // Always show empty zones (newly created); non-empty zones show only if items match
            return (e.items.length === 0 || filteredItems.length > 0) ? [{ ...e, items: filteredItems }] : [];
          }
          return filterItem(e) ? [e] : [];
        });
      };

      const requestConfirm = (message, onConfirm) => setConfirmState({ message, onConfirm });

      const setLoc2 = (l) => { setLoc(l); setRoomId(null); setView("restocking"); resetFilters(); };

      const upd = (fn) => setData(prev => ({ ...prev, [loc]: fn(prev[loc]) }));
      const updRoom = (fn) => upd(d => ({ ...d, rooms: d.rooms.map(r => r.id === roomId ? fn(r) : r) }));
      const updList = (key, fn) => updRoom(r => ({ ...r, [key]: fn(r[key] ?? []) }));

      // Room ops
      const reorderRooms = (fromIdx, toIdx) => {
        upd(d => {
          const rooms = [...d.rooms];
          const [moved] = rooms.splice(fromIdx, 1);
          rooms.splice(toIdx, 0, moved);
          return { ...d, rooms };
        });
      };

      const addRoom = () => {
        if (!newRoomName.trim()) return;
        const r = createRoom(newRoomName.trim());
        upd(d => ({ ...d, rooms: [...d.rooms, r] }));
        setRoomId(r.id); setNewRoomName(""); setAddingRoom(false);
      };
      const deleteRoom = (id) => {
        upd(d => ({ ...d, rooms: d.rooms.filter(r => r.id !== id) }));
        if (roomId === id) setRoomId(null);
      };
      const renameRoom = () => {
        if (!editingRoom?.name?.trim()) { setEditingRoom(null); return; }
        upd(d => ({ ...d, rooms: d.rooms.map(r => r.id === editingRoom.id ? { ...r, name: editingRoom.name.trim() } : r) }));
        setEditingRoom(null);
      };

      // Employee ops
      const updateEmployees = (employees) => upd(d => ({ ...d, employees }));

      // Import ops
      const handleImportData = (importedRooms, mode) => {
        // Returns a Set of lowercased task names already in a list (including inside zones)
        const existingNames = (list) => {
          const names = new Set();
          (list || []).forEach(e => {
            if (e.type === 'zone') e.items.forEach(t => { if (t.task?.trim()) names.add(t.task.trim().toLowerCase()); });
            else if (e.task?.trim()) names.add(e.task.trim().toLowerCase());
          });
          return names;
        };

        // Filter out imported tasks whose name already exists in the target list
        const dedup = (existingList, incomingList) => {
          const taken = existingNames(existingList);
          return incomingList.filter(t => !taken.has((t.task || "").trim().toLowerCase()));
        };

        upd(d => {
          let rooms = [...d.rooms];
          importedRooms.forEach(importedRoom => {
            const existingIdx = rooms.findIndex(r => r.name.toLowerCase() === importedRoom.name.toLowerCase());
            if (existingIdx >= 0) {
              if (mode === 'replace-rooms') {
                rooms[existingIdx] = { ...rooms[existingIdx], restocking: importedRoom.restocking, cleaning: importedRoom.cleaning, monthly: importedRoom.monthly };
              } else {
                const ex = rooms[existingIdx];
                rooms[existingIdx] = {
                  ...ex,
                  restocking: [...ex.restocking, ...dedup(ex.restocking, importedRoom.restocking)],
                  cleaning:   [...ex.cleaning,   ...dedup(ex.cleaning,   importedRoom.cleaning)],
                  monthly:    [...ex.monthly,     ...dedup(ex.monthly,    importedRoom.monthly)],
                };
              }
            } else {
              rooms.push({ id: uid(), name: importedRoom.name, restocking: importedRoom.restocking, cleaning: importedRoom.cleaning, monthly: importedRoom.monthly });
            }
          });
          return { ...d, rooms };
        });
      };

      // Item ops
      const addItem    = (key) => updList(key, list => [...list, createItem()]);
      const deleteItem = (key, id) => updList(key, list => deleteFromList(list, id));
      const updateItem = (key, id, field, val) => updList(key, list => updateInList(list, id, field, val));
      const moveItem   = (key, id, dir) => updList(key, list => {
        // Try top-level first
        const topIdx = list.findIndex(e => e.id === id);
        if (topIdx >= 0) {
          const arr = [...list];
          if (dir === "up"   && topIdx > 0)              [arr[topIdx-1], arr[topIdx]] = [arr[topIdx], arr[topIdx-1]];
          if (dir === "down" && topIdx < arr.length - 1) [arr[topIdx], arr[topIdx+1]] = [arr[topIdx+1], arr[topIdx]];
          return arr;
        }
        // Try inside zones
        return list.map(e => {
          if (e.type !== 'zone') return e;
          const idx = e.items.findIndex(t => t.id === id);
          if (idx < 0) return e;
          const items = [...e.items];
          if (dir === "up"   && idx > 0)              [items[idx-1], items[idx]] = [items[idx], items[idx-1]];
          if (dir === "down" && idx < items.length-1) [items[idx], items[idx+1]] = [items[idx+1], items[idx]];
          return { ...e, items };
        });
      });
      const reorderTopLevel = (key, fromIdx, toIdx) => updList(key, list => {
        const arr = [...list];
        const [moved] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, moved);
        return arr;
      });
      const reorderInZone = (key, zoneId, fromIdx, toIdx) => updList(key, list =>
        list.map(e => {
          if (e.id !== zoneId) return e;
          const items = [...e.items];
          const [moved] = items.splice(fromIdx, 1);
          items.splice(toIdx, 0, moved);
          return { ...e, items };
        })
      );

      // Zone ops
      const addZone = (key) => updList(key, list => [...list, createZone()]);
      const deleteZone = (key, zoneId) => updList(key, list => {
        const idx = list.findIndex(e => e.id === zoneId);
        if (idx < 0) return list;
        const zone = list[idx];
        return [...list.slice(0, idx), ...(zone.items || []), ...list.slice(idx + 1)];
      });
      const renameZone = (key, zoneId, name) => updList(key, list =>
        list.map(e => e.id === zoneId ? { ...e, name } : e)
      );
      const toggleZone = (key, zoneId) => updList(key, list =>
        list.map(e => e.id === zoneId ? { ...e, collapsed: !e.collapsed } : e)
      );
      const addItemToZone = (key, zoneId) => updList(key, list =>
        list.map(e => e.id === zoneId ? { ...e, items: [...e.items, createItem()] } : e)
      );
      const moveTaskToZone = (key, taskId, targetZoneId) => updList(key, list => {
        let task = null;
        const listWithoutTask = list.map(e => {
          if (e.type === 'zone') {
            const idx = e.items.findIndex(t => t.id === taskId);
            if (idx >= 0) { task = e.items[idx]; return { ...e, items: e.items.filter(t => t.id !== taskId) }; }
            return e;
          }
          if (e.id === taskId) { task = e; return null; }
          return e;
        }).filter(Boolean);
        if (!task) return list;
        if (!targetZoneId) return [...listWithoutTask, task];
        return listWithoutTask.map(e => e.id === targetZoneId ? { ...e, items: [...e.items, task] } : e);
      });

      // Move a task to a specific position: targetZoneId=null → top level, else into that zone
      const moveTaskCross = (key, taskId, targetZoneId, beforeIdx) => updList(key, list => {
        let task = null;
        const withoutTask = list.reduce((acc, e) => {
          if (e.type === 'zone') {
            const idx = e.items.findIndex(t => t.id === taskId);
            if (idx >= 0) { task = e.items[idx]; acc.push({ ...e, items: e.items.filter(t => t.id !== taskId) }); }
            else acc.push(e);
          } else if (e.id === taskId) { task = e; }
          else acc.push(e);
          return acc;
        }, []);
        if (!task) return list;
        if (targetZoneId === null || targetZoneId === undefined) {
          const insertIdx = beforeIdx !== undefined ? Math.min(beforeIdx, withoutTask.length) : withoutTask.length;
          const result = [...withoutTask];
          result.splice(insertIdx, 0, task);
          return result;
        }
        return withoutTask.map(e => {
          if (e.id !== targetZoneId) return e;
          const items = [...e.items];
          const insertIdx = beforeIdx !== undefined ? Math.min(beforeIdx, items.length) : items.length;
          items.splice(insertIdx, 0, task);
          return { ...e, items };
        });
      });

      // Move a task from one list type to another (e.g. restocking → monthly)
      const moveTaskToList = (sourceKey, targetKey, taskId) => {
        if (sourceKey === targetKey) return;
        updRoom(r => {
          let task = null;
          const srcList = (r[sourceKey] ?? []).map(e => {
            if (e.type === 'zone') {
              const idx = e.items.findIndex(t => t.id === taskId);
              if (idx >= 0) {
                task = e.items[idx];
                return { ...e, items: e.items.filter(t => t.id !== taskId) };
              }
              return e;
            }
            if (e.id === taskId) { task = e; return null; }
            return e;
          }).filter(Boolean);
          if (!task) return r;
          return {
            ...r,
            [sourceKey]: srcList,
            [targetKey]: [...(r[targetKey] ?? []), task],
          };
        });
      };

      // ─────────────────────────────────────────────────────────────
      return (
        <div className="h-screen flex flex-col bg-gray-100" style={{ fontFamily: "'Inter', system-ui, -apple-system, sans-serif" }}>

          {/* ── Print + Font styles ── */}
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
            @media print {
              .no-print  { display: none !important; }
              .print-only { display: block !important; }
              body, html { background: white !important; height: auto !important; overflow: visible !important; }
              #root { height: auto !important; overflow: visible !important; }
              .print-scroll { overflow: visible !important; height: auto !important; }
              @page { size: landscape; margin: 1.2cm; }
              table { border-collapse: collapse; width: 100%; font-size: 9pt; }
              th, td { border: 1px solid #ccc; padding: 3pt 5pt; }
              th { background-color: #f4f4f4 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
              .print-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14pt; }
              .print-panel { break-inside: avoid; }
              .print-header { display: block !important; margin-bottom: 12pt; border-bottom: 2px solid #333; padding-bottom: 6pt; }
            }
            .print-header { display: none; }
          `}</style>

          {/* ── Header / Location Tabs ── */}
          <header className="no-print flex-none flex items-center gap-0 bg-white border-b border-gray-200 shadow-sm">
            {/* Logo area */}
            <div className="px-5 py-3.5 border-r border-gray-200 flex items-center gap-2.5">
              <div className="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center flex-none">
                <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
              </div>
              <div>
                <p className="text-blue-600 font-bold text-sm leading-none tracking-wide">House Manager</p>
                <p className="text-gray-400 text-xs mt-0.5">Checklist System</p>
              </div>
            </div>

            {/* Location tabs */}
            <div className="flex items-stretch h-full">
              {LOCATIONS.map(l => {
                const active = loc === l;
                return (
                  <button
                    key={l}
                    onClick={() => setLoc2(l)}
                    className={`px-5 py-3.5 text-sm font-semibold transition-all border-b-2 ${
                      active
                        ? "text-blue-600 border-blue-600"
                        : "text-gray-500 border-transparent hover:text-gray-800 hover:border-gray-300"
                    }`}
                  >
                    {l}
                  </button>
                );
              })}
            </div>

            {/* ── Data toolbar: Export / Backup / Restore ── */}
            <div className="ml-auto flex items-center gap-2 px-4 border-l border-gray-200">
              {/* Custom Print */}
              <button
                onClick={() => setShowPrintModal(true)}
                title="Print checklists filtered by employee, room, and list type"
                className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-slate-50 hover:border-slate-400 hover:text-slate-700 transition-all shadow-sm"
              >
                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                </svg>
                Custom Print
              </button>

              {/* Export CSV */}
              <button
                onClick={() => exportCSV(data)}
                title="Export all checklists to a CSV spreadsheet"
                className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-emerald-50 hover:border-emerald-300 hover:text-emerald-700 transition-all shadow-sm"
              >
                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Export CSV
              </button>

              {/* JSON Backup */}
              <button
                onClick={() => exportJSON(data)}
                title="Download a full data backup (.json)"
                className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700 transition-all shadow-sm"
              >
                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                </svg>
                Backup
              </button>

              {/* Restore from JSON */}
              <label
                title="Restore all data from a .json backup file"
                className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-amber-50 hover:border-amber-300 hover:text-amber-700 transition-all shadow-sm cursor-pointer"
              >
                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
                Restore
                <input ref={importRef} type="file" accept=".json" className="hidden" onChange={handleImport} />
              </label>

              {/* Import Data from CSV */}
              <button
                onClick={() => setShowImportModal(true)}
                title="Import tasks from a CSV file into the current location"
                className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-gray-600 bg-white border border-gray-200 rounded-lg hover:bg-indigo-50 hover:border-indigo-300 hover:text-indigo-700 transition-all shadow-sm"
              >
                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Import
              </button>

              {/* Last saved indicator */}
              {lastSaved && !saveError && (
                <span className="text-xs text-gray-400 font-medium whitespace-nowrap pr-1">
                  ✓ Saved {lastSaved.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                </span>
              )}

              {/* Google Sheets Auto-Sync */}
              <button
                onClick={() => sheetsUrl ? handleSheetsSync("Manual") : setShowSheetsModal(true)}
                onContextMenu={e => { e.preventDefault(); setShowSheetsModal(true); }}
                title={sheetsUrl
                  ? `Syncing to Google Sheets every 30 min · Last synced: ${sheetsLastSync ? sheetsLastSync.toLocaleTimeString() : "not yet"} · Right-click to change URL`
                  : "Set up Google Sheets auto-sync"}
                className={`flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold border rounded-lg transition-all shadow-sm ${
                  sheetsUrl
                    ? sheetsSyncing
                      ? "text-emerald-600 border-emerald-300 bg-emerald-50 opacity-70"
                      : sheetsLastSync
                        ? "text-emerald-700 border-emerald-300 bg-emerald-50 hover:bg-emerald-100"
                        : "text-emerald-600 border-emerald-200 bg-white hover:bg-emerald-50"
                    : "text-gray-600 bg-white border-gray-200 hover:bg-emerald-50 hover:border-emerald-300 hover:text-emerald-700"
                }`}
              >
                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M3 14h18M10 3v18M14 3v18M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2z"/>
                </svg>
                {sheetsUrl
                  ? sheetsSyncing ? "Syncing…" : sheetsLastSync ? "✓ Sheets" : "Sheets ↗"
                  : "Sheets Setup"}
              </button>
            </div>
          </header>

          {/* ── Save error banner ── */}
          {saveError && (
            <div className="no-print flex-none bg-red-600 text-white text-xs font-semibold px-5 py-2.5 flex items-center gap-3">
              <svg className="w-4 h-4 flex-none" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
              </svg>
              <span>Data could not be saved — storage may be full. Export a backup immediately.</span>
              <button
                onClick={() => exportJSON(data)}
                className="ml-2 px-3 py-1 bg-white text-red-700 font-semibold rounded-lg hover:bg-red-50 transition-colors text-xs"
              >
                Export Backup Now
              </button>
            </div>
          )}

          {/* ── Body ── */}
          <div className="flex flex-1 overflow-hidden">

            {/* ── Sidebar ── */}
            {/* ── Location Settings Modal ── */}
            {showSheetsModal && (
              <SheetsModal
                currentUrl={sheetsUrl}
                onSave={(url) => { setSheetsUrl(url); localStorage.setItem(SHEETS_KEY, url); }}
                onClose={() => setShowSheetsModal(false)}
              />
            )}
            {showSettings && (
              <LocationSettingsModal
                loc={loc}
                employees={locData.employees ?? []}
                onUpdate={updateEmployees}
                onClose={() => setShowSettings(false)}
              />
            )}
            {showImportModal && (
              <ImportModal
                loc={loc}
                existingRooms={locData.rooms}
                onImport={handleImportData}
                onClose={() => setShowImportModal(false)}
              />
            )}
            {showPrintModal && (
              <PrintModal
                loc={loc}
                locData={locData}
                onClose={() => setShowPrintModal(false)}
              />
            )}
            {confirmState && (
              <ConfirmModal
                message={confirmState.message}
                onConfirm={() => { confirmState.onConfirm(); setConfirmState(null); }}
                onCancel={() => setConfirmState(null)}
              />
            )}

            {/* ── New-week banner ── */}
            {resetDue && (
              <div className="no-print fixed bottom-5 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-5 py-3 bg-white border border-amber-300 rounded-2xl shadow-xl text-sm">
                <span className="text-lg">📅</span>
                <span className="font-semibold text-gray-700">It's a new week — ready to reset all checklists?</span>
                <button
                  onClick={doWeeklyReset}
                  className="px-3 py-1.5 bg-amber-500 hover:bg-amber-600 text-white text-xs font-bold rounded-lg transition-colors"
                >
                  Reset Now
                </button>
                <button
                  onClick={() => { localStorage.setItem(RESET_KEY, Date.now().toString()); setResetDue(false); }}
                  className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-semibold rounded-lg transition-colors"
                >
                  Not Yet
                </button>
              </div>
            )}

            {/* ── Save toast ── */}
            {saveToast && (
              <div className="no-print fixed bottom-5 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-5 py-3 bg-emerald-600 text-white rounded-2xl shadow-xl text-sm font-semibold pointer-events-none">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/>
                </svg>
                Saved — {saveToast.roomName} · {saveToast.listLabel} logged for this week
              </div>
            )}

            <aside className="no-print flex-none w-56 flex flex-col bg-white border-r border-gray-200 shadow-sm">
              <div className="px-4 py-3 border-b border-gray-200 bg-gray-50 flex items-center justify-between">
                <div>
                  <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">Rooms & Areas</p>
                  <p className="text-xs text-gray-500 mt-0.5 font-medium truncate">{loc}</p>
                </div>
                <button
                  onClick={() => setShowSettings(true)}
                  title="Location settings"
                  className="p-1.5 rounded-lg text-gray-400 hover:text-slate-700 hover:bg-gray-200 transition-colors"
                >
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </button>
              </div>

              {/* ── Location-level completion infographics ── */}
              <div className="px-3 py-3 border-b border-gray-200 bg-gray-50">
                <div className="flex items-center justify-around">
                  {LIST_META.map(({ key, abbr, light, border, text, bar, stroke }) => {
                    const allItems = locData.rooms.flatMap(r => flattenList(r[key] || []));
                    const total = allItems.length;
                    const done  = allItems.filter(i => i.completed || i.notNeeded).length;
                    const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
                    const full  = pct === 100 && total > 0;
                    const R = 8, circ = 2 * Math.PI * R, dash = (pct / 100) * circ;
                    return (
                      <div key={key} className="flex flex-col items-center gap-1">
                        {/* Pie chart or green checkmark */}
                        {full ? (
                          <svg className="w-7 h-7" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" fill="#dcfce7"/>
                            <path d="M7 13l3 3 7-7" stroke="#16a34a" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                          </svg>
                        ) : (
                          <svg className="w-7 h-7" viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r={R} fill="none" stroke="#e5e7eb" strokeWidth="3.5"/>
                            {pct > 0 && (
                              <circle cx="12" cy="12" r={R} fill="none" stroke={stroke} strokeWidth="3.5"
                                strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
                                transform="rotate(-90 12 12)"/>
                            )}
                          </svg>
                        )}
                        {/* Letter bubble */}
                        <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold border ${
                          full ? "bg-green-50 text-green-700 border-green-200" : `${light} ${text} ${border}`
                        }`}>
                          {abbr}
                        </div>
                        {/* Percentage */}
                        <span className={`text-[10px] font-bold leading-none ${full ? "text-green-600" : text}`}>
                          {pct}%
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>

              <nav className="flex-1 overflow-y-auto py-2 px-2 space-y-0.5">
                {locData.rooms.length === 0 && (
                  <div className="text-center py-8 px-3">
                    <p className="text-2xl mb-2">🏠</p>
                    <p className="text-xs text-gray-400 italic">No rooms added yet.<br/>Use the button below.</p>
                  </div>
                )}
                {locData.rooms.map((r, idx) => (
                  <div
                    key={r.id}
                    draggable
                    onDragStart={() => setDragRoomIdx(idx)}
                    onDragOver={e => { e.preventDefault(); setDragOverRoomIdx(idx); }}
                    onDrop={e => { e.preventDefault(); if (dragRoomIdx !== null && dragRoomIdx !== idx) reorderRooms(dragRoomIdx, idx); setDragRoomIdx(null); setDragOverRoomIdx(null); }}
                    onDragEnd={() => { setDragRoomIdx(null); setDragOverRoomIdx(null); }}
                    className={`group/room flex items-center rounded-xl transition-all ${
                      dragRoomIdx === idx     ? "opacity-40 bg-slate-100" :
                      dragOverRoomIdx === idx && dragRoomIdx !== idx ? "ring-2 ring-blue-400 ring-inset" :
                      roomId === r.id        ? "bg-blue-600 shadow-sm" :
                                               "hover:bg-gray-100"
                    }`}
                  >
                    {/* Drag handle */}
                    <div
                      className={`pl-2 flex-none cursor-grab active:cursor-grabbing opacity-0 group-hover/room:opacity-100 transition-opacity ${roomId === r.id ? "text-blue-300" : "text-gray-300"}`}
                      title="Drag to reorder"
                    >
                      <svg className="w-3 h-3" fill="currentColor" viewBox="0 0 16 16">
                        <circle cx="5" cy="4" r="1.2"/><circle cx="11" cy="4" r="1.2"/>
                        <circle cx="5" cy="8" r="1.2"/><circle cx="11" cy="8" r="1.2"/>
                        <circle cx="5" cy="12" r="1.2"/><circle cx="11" cy="12" r="1.2"/>
                      </svg>
                    </div>

                    {editingRoom?.id === r.id ? (
                      <input
                        autoFocus
                        value={editingRoom.name}
                        onChange={e => setEditingRoom(p => ({ ...p, name: e.target.value }))}
                        onBlur={renameRoom}
                        onKeyDown={e => { if (e.key === "Enter") renameRoom(); if (e.key === "Escape") setEditingRoom(null); }}
                        className="flex-1 mx-2 my-1 text-xs border border-blue-300 rounded-full px-3 py-1 focus:outline-none focus:ring-1 focus:ring-blue-400"
                      />
                    ) : (
                      <>
                        <button
                          onClick={() => { setRoomId(r.id); setView("restocking"); resetFilters(); }}
                          className={`flex-1 text-left px-3 py-2 text-xs font-semibold ${
                            roomId === r.id ? "text-white" : "text-gray-600"
                          }`}
                        >
                          <span className="block truncate mb-1">{r.name}</span>
                          {LIST_META.map(({ key, abbr, bar, text }) => {
                            const items = flattenList(r[key] || []);
                            const total = items.length;
                            const done  = items.filter(i => i.completed || i.notNeeded).length;
                            const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
                            const active = roomId === r.id;
                            return (
                              <div key={key} className="flex items-center gap-1 mt-0.5">
                                <span className={`text-[9px] font-bold w-3 flex-none ${active ? "text-blue-200" : text}`}>{abbr}</span>
                                <div className={`h-1.5 rounded-full overflow-hidden flex-1 ${active ? "bg-blue-500" : "bg-gray-200"}`}>
                                  <div className={`h-1.5 rounded-full transition-all duration-300 ${active ? "bg-white/80" : bar}`}
                                       style={{ width: `${pct}%` }}/>
                                </div>
                                <span className={`text-[9px] font-semibold w-7 text-right flex-none ${active ? "text-blue-200" : "text-gray-400"}`}>{pct}%</span>
                              </div>
                            );
                          })}
                        </button>
                        <div className="pr-2 flex gap-0.5 opacity-0 group-hover/room:opacity-100 transition-opacity">
                          <button
                            onClick={() => setEditingRoom({ id: r.id, name: r.name })}
                            title="Rename"
                            className={`p-1 rounded-full ${roomId === r.id ? "text-blue-200 hover:text-white hover:bg-blue-500" : "text-gray-300 hover:text-blue-500 hover:bg-blue-50"}`}
                          >
                            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                            </svg>
                          </button>
                          <button
                            onClick={() => requestConfirm(`Delete "${r.name}" and all its tasks? This cannot be undone.`, () => deleteRoom(r.id))}
                            title="Delete room"
                            className={`p-1 rounded-full ${roomId === r.id ? "text-blue-200 hover:text-white hover:bg-blue-500" : "text-gray-300 hover:text-red-500 hover:bg-red-50"}`}
                          >
                            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                          </button>
                        </div>
                      </>
                    )}
                  </div>
                ))}
              </nav>

              {/* Add room */}
              <div className="p-3 border-t border-gray-200">
                {addingRoom ? (
                  <div className="space-y-2">
                    <input
                      autoFocus
                      placeholder="Room or area name..."
                      value={newRoomName}
                      onChange={e => setNewRoomName(e.target.value)}
                      onKeyDown={e => {
                        if (e.key === "Enter") addRoom();
                        if (e.key === "Escape") { setAddingRoom(false); setNewRoomName(""); }
                      }}
                      className="w-full text-xs border border-gray-200 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
                    />
                    <div className="flex gap-1.5">
                      <button onClick={addRoom} className="flex-1 py-2 text-xs bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-semibold transition-colors">Add</button>
                      <button onClick={() => { setAddingRoom(false); setNewRoomName(""); }} className="py-2 px-3 text-xs text-gray-500 rounded-xl hover:bg-gray-100 border border-gray-200 transition-colors">Cancel</button>
                    </div>
                  </div>
                ) : (
                  <button
                    onClick={() => setAddingRoom(true)}
                    className="w-full py-2.5 text-xs text-white font-semibold bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors shadow-sm"
                  >
                    + Add Room / Area
                  </button>
                )}
              </div>
            </aside>

            {/* ── Main Content ── */}
            <main className="flex-1 overflow-auto print-scroll">
              {!room ? (
                <LocationDashboard
                  loc={loc}
                  locData={locData}
                  locColor={locColor}
                  onSelectRoom={(id) => { setRoomId(id); setView("restocking"); resetFilters(); }}
                />
              ) : (
                <div className="p-5 max-w-none">

                  {/* Print-only header */}
                  <div className="print-header">
                    <h1 style={{ fontSize: "16pt", fontWeight: "bold", margin: 0 }}>{loc} — {room.name}</h1>
                    <p style={{ fontSize: "9pt", color: "#666", marginTop: "2pt" }}>
                      {view === "restocking" ? "Restocking Checklist" : view === "cleaning" ? "Cleaning Checklist" : "Monthly Checklist"} · {new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" })}
                    </p>
                  </div>

                  {/* Screen toolbar */}
                  <div className="no-print flex items-center justify-between mb-5">
                    <div>
                      <div className="flex items-center gap-2">
                        <span className={`w-2 h-2 rounded-full ${locColor.dot}`} />
                        <p className="text-xs text-gray-400 font-semibold uppercase tracking-wider">{loc}</p>
                      </div>
                      <h2 className="text-xl font-bold text-gray-800 mt-0.5">{room.name}</h2>
                    </div>

                    <div className="flex items-center gap-2.5">
                      {/* View toggle — pill style */}
                      <div className="flex items-center gap-1.5 bg-gray-100 rounded-2xl p-1">
                        {[
                          { key: "restocking", label: "Restocking", active: "bg-amber-500"   },
                          { key: "cleaning",   label: "Cleaning",   active: "bg-emerald-500" },
                          { key: "monthly",    label: "Monthly",    active: "bg-violet-500"  },
                        ].map(({ key, label, active }) => (
                          <button
                            key={key}
                            onClick={() => setView(key)}
                            className={`px-4 py-1.5 rounded-xl text-xs font-semibold transition-all ${
                              view === key
                                ? `${active} text-white shadow-sm`
                                : "text-gray-500 hover:text-gray-800"
                            }`}
                          >
                            {label}
                          </button>
                        ))}
                      </div>

                      {/* Print + Save stack */}
                      <div className="flex flex-col gap-1.5">
                        <button
                          onClick={() => openPrintWindow(loc, room, view)}
                          className="flex items-center gap-1.5 px-3.5 py-2 text-xs font-semibold bg-white border border-gray-200 rounded-xl hover:bg-gray-50 shadow-sm text-gray-600 transition-colors"
                        >
                          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                          </svg>
                          Print
                        </button>
                        <button
                          onClick={() => {
                            const listMeta = { restocking: "Restocking", cleaning: "Cleaning", monthly: "Monthly" };
                            saveWeeklyLog(room.name, view, listMeta[view] || view, room[view] || []);
                          }}
                          className="flex items-center gap-1.5 px-3.5 py-2 text-xs font-semibold bg-emerald-50 border border-emerald-200 rounded-xl hover:bg-emerald-100 shadow-sm text-emerald-700 transition-colors"
                        >
                          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                          </svg>
                          Save
                        </button>
                      </div>
                    </div>
                  </div>

                  {/* Filter bar */}
                  <FilterBar
                    allItems={flattenList(room[view] || [])}
                    employees={locData.employees ?? []}
                    text={filterText}
                    priority={filterPriority}
                    frequency={filterFrequency}
                    status={filterStatus}
                    assignee={filterAssignee}
                    onText={setFilterText}
                    onPriority={setFilterPriority}
                    onFrequency={setFilterFrequency}
                    onStatus={setFilterStatus}
                    onAssignee={setFilterAssignee}
                    onClear={resetFilters}
                  />

                  {/* Checklist panels */}
                  {view === "restocking" && (
                    <ChecklistPanel
                      title="Restocking"
                      accent="amber"
                      list={applyFilters(room.restocking)}
                      employees={locData.employees ?? []}
                      onUpdate={(id, f, v) => updateItem("restocking", id, f, v)}
                      onAdd={() => addItem("restocking")}
                      onDelete={id => requestConfirm("Delete this task? This cannot be undone.", () => deleteItem("restocking", id))}
                      onMove={(id, dir) => moveItem("restocking", id, dir)}
                      onAddZone={() => addZone("restocking")}
                      onDeleteZone={id => deleteZone("restocking", id)}
                      onRenameZone={(zoneId, name) => renameZone("restocking", zoneId, name)}
                      onToggleZone={zoneId => toggleZone("restocking", zoneId)}
                      onAddItemToZone={zoneId => addItemToZone("restocking", zoneId)}
                      onReorderTopLevel={(from, to) => reorderTopLevel("restocking", from, to)}
                      onReorderInZone={(zoneId, from, to) => reorderInZone("restocking", zoneId, from, to)}
                      onMoveTaskToZone={(taskId, zoneId) => moveTaskToZone("restocking", taskId, zoneId)}
                      onMoveTaskCross={(taskId, zoneId, beforeIdx) => moveTaskCross("restocking", taskId, zoneId, beforeIdx)}
                      requestConfirm={requestConfirm}
                      listKey="restocking"
                      onMoveToList={(taskId, targetKey) => moveTaskToList("restocking", targetKey, taskId)}
                    />
                  )}
                  {view === "cleaning" && (
                    <ChecklistPanel
                      title="Cleaning"
                      accent="emerald"
                      list={applyFilters(room.cleaning)}
                      employees={locData.employees ?? []}
                      onUpdate={(id, f, v) => updateItem("cleaning", id, f, v)}
                      onAdd={() => addItem("cleaning")}
                      onDelete={id => requestConfirm("Delete this task? This cannot be undone.", () => deleteItem("cleaning", id))}
                      onMove={(id, dir) => moveItem("cleaning", id, dir)}
                      onAddZone={() => addZone("cleaning")}
                      onDeleteZone={id => deleteZone("cleaning", id)}
                      onRenameZone={(zoneId, name) => renameZone("cleaning", zoneId, name)}
                      onToggleZone={zoneId => toggleZone("cleaning", zoneId)}
                      onAddItemToZone={zoneId => addItemToZone("cleaning", zoneId)}
                      onReorderTopLevel={(from, to) => reorderTopLevel("cleaning", from, to)}
                      onReorderInZone={(zoneId, from, to) => reorderInZone("cleaning", zoneId, from, to)}
                      onMoveTaskToZone={(taskId, zoneId) => moveTaskToZone("cleaning", taskId, zoneId)}
                      onMoveTaskCross={(taskId, zoneId, beforeIdx) => moveTaskCross("cleaning", taskId, zoneId, beforeIdx)}
                      requestConfirm={requestConfirm}
                      listKey="cleaning"
                      onMoveToList={(taskId, targetKey) => moveTaskToList("cleaning", targetKey, taskId)}
                    />
                  )}
                  {view === "monthly" && (
                    <ChecklistPanel
                      title="Monthly"
                      accent="violet"
                      list={applyFilters(room.monthly)}
                      employees={locData.employees ?? []}
                      onUpdate={(id, f, v) => updateItem("monthly", id, f, v)}
                      onAdd={() => addItem("monthly")}
                      onDelete={id => requestConfirm("Delete this task? This cannot be undone.", () => deleteItem("monthly", id))}
                      onMove={(id, dir) => moveItem("monthly", id, dir)}
                      onAddZone={() => addZone("monthly")}
                      onDeleteZone={id => deleteZone("monthly", id)}
                      onRenameZone={(zoneId, name) => renameZone("monthly", zoneId, name)}
                      onToggleZone={zoneId => toggleZone("monthly", zoneId)}
                      onAddItemToZone={zoneId => addItemToZone("monthly", zoneId)}
                      onReorderTopLevel={(from, to) => reorderTopLevel("monthly", from, to)}
                      onReorderInZone={(zoneId, from, to) => reorderInZone("monthly", zoneId, from, to)}
                      onMoveTaskToZone={(taskId, zoneId) => moveTaskToZone("monthly", taskId, zoneId)}
                      onMoveTaskCross={(taskId, zoneId, beforeIdx) => moveTaskCross("monthly", taskId, zoneId, beforeIdx)}
                      requestConfirm={requestConfirm}
                      listKey="monthly"
                      onMoveToList={(taskId, targetKey) => moveTaskToList("monthly", targetKey, taskId)}
                    />
                  )}
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
