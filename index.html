<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Manager — Checklist System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── Utilities ───────────────────────────────────────────────────────────────
    let _counter = 0;
    const uid = () => `id_${Date.now()}_${++_counter}`;

    const createItem = () => ({
      id: uid(), task: "", details: "", secondaryHow: "", frequency: "", priority: "", assignee: "", time: "", completed: false, lastCompleted: "",
    });

    const createRoom = (name) => ({
      id: uid(), name, restocking: [], cleaning: [], monthly: [],
    });

    const LOCATIONS = ["The Park House", "The Studio", "The Lamon House"];

    const FREQUENCY_OPTIONS = ["Weekly", "Bi-Weekly", "Monthly", "Quarterly", "Yearly", "As Needed"];

    const PRIORITY_OPTIONS = ["High", "Medium", "Low"];
    const PRIORITY_STYLES = {
      High:   { pill: "bg-red-100 text-red-700 border border-red-200",    dot: "bg-red-400"    },
      Medium: { pill: "bg-yellow-100 text-yellow-700 border border-yellow-200", dot: "bg-yellow-400" },
      Low:    { pill: "bg-green-100 text-green-700 border border-green-200",  dot: "bg-green-400"  },
    };

    const LOCATION_COLORS = {
      "The Park House": { tab: "bg-sky-600", dot: "bg-sky-500" },
      "The Studio":     { tab: "bg-violet-600", dot: "bg-violet-500" },
      "The Lamon House":{ tab: "bg-teal-600", dot: "bg-teal-500" },
    };

    // Sample starter data so the UI feels populated on first load
    const buildSampleData = () => {
      const ph_kitchen = createRoom("Kitchen");
      ph_kitchen.restocking = [
        { id: uid(), task: "Paper Towels",   details: "Under sink cabinet",    secondaryHow: "Check Amazon sub.",  frequency: "Weekly",    assignee: "" },
        { id: uid(), task: "Dish Soap",      details: "Dawn original",         secondaryHow: "Order if < 1 bottle", frequency: "Monthly",  assignee: "" },
        { id: uid(), task: "Coffee / Pods",  details: "Nespresso drawer",      secondaryHow: "Reorder at < 5 pods",frequency: "Weekly",   assignee: "" },
        { id: uid(), task: "Hand Soap",      details: "Foaming pump by sink",  secondaryHow: "Refill from bulk jug",frequency: "As needed",assignee: "" },
      ];
      ph_kitchen.cleaning = [
        { id: uid(), task: "Wipe countertops", details: "All surfaces + backsplash", secondaryHow: "All-purpose spray", frequency: "Daily",    assignee: "" },
        { id: uid(), task: "Clean stovetop",   details: "Burners & drip pans",       secondaryHow: "Degreaser if needed",frequency: "Weekly",  assignee: "" },
        { id: uid(), task: "Empty trash",      details: "Replace bag (tall kitchen)", secondaryHow: "Bags under sink",    frequency: "As needed",assignee: "" },
        { id: uid(), task: "Wipe appliances",  details: "Toaster, microwave outside", secondaryHow: "Damp cloth",        frequency: "Weekly",  assignee: "" },
      ];
      ph_kitchen.monthly = [
        { id: uid(), task: "Deep clean fridge",   details: "Remove all items, wipe shelves", secondaryHow: "Baking soda + water", frequency: "Monthly", assignee: "" },
        { id: uid(), task: "Clean oven interior", details: "Racks + bottom",                 secondaryHow: "Oven cleaner spray",  frequency: "Monthly", assignee: "" },
        { id: uid(), task: "Replace Brita filter",details: "Pitcher in fridge",              secondaryHow: "Filters in pantry",   frequency: "Monthly", assignee: "" },
      ];

      const ph_master = createRoom("Master Bedroom");
      ph_master.restocking = [
        { id: uid(), task: "Kleenex",      details: "Nightstand box",     secondaryHow: "Hall closet stock",  frequency: "As needed", assignee: "" },
        { id: uid(), task: "Phone charger",details: "Confirm working",    secondaryHow: "Check both sides",   frequency: "Weekly",    assignee: "" },
      ];
      ph_master.cleaning = [
        { id: uid(), task: "Change bed linens", details: "Sheets + pillowcases", secondaryHow: "Fresh set in linen closet", frequency: "Weekly",    assignee: "" },
        { id: uid(), task: "Vacuum floors",     details: "Under bed + corners",  secondaryHow: "Attachment for edges",     frequency: "Weekly",    assignee: "" },
        { id: uid(), task: "Dust surfaces",     details: "All furniture + fans",  secondaryHow: "Microfiber cloth",         frequency: "Weekly",    assignee: "" },
      ];

      return {
        "The Park House":  { rooms: [ph_kitchen, ph_master], employees: [] },
        "The Studio":      { rooms: [], employees: [] },
        "The Lamon House": { rooms: [], employees: [] },
      };
    };

    // ─── Time helpers ────────────────────────────────────────────────────────────
    const parseMinutes = (str) => {
      if (!str) return 0;
      const s = str.toLowerCase().trim();
      const hr = s.match(/(\d+\.?\d*)\s*(hr|hrs|hour|hours)/);
      if (hr) return Math.round(parseFloat(hr[1]) * 60);
      const mn = s.match(/(\d+\.?\d*)\s*(min|mins|minute|minutes)?/);
      if (mn && mn[1]) return Math.round(parseFloat(mn[1]));
      return 0;
    };

    const formatTime = (mins) => {
      if (!mins) return "—";
      if (mins < 60) return `${mins} min`;
      const h = Math.floor(mins / 60), m = mins % 60;
      return m > 0 ? `${h}h ${m}m` : `${h}h`;
    };

    // ─── EditableCell ─────────────────────────────────────────────────────────────
    function EditableCell({ value, onSave, placeholder = "—" }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(value);

      const commit = () => { onSave(draft); setEditing(false); };

      if (editing) {
        return (
          <input
            autoFocus
            value={draft}
            onChange={e => setDraft(e.target.value)}
            onBlur={commit}
            onKeyDown={e => {
              if (e.key === "Enter" || e.key === "Tab") { e.preventDefault(); commit(); }
              if (e.key === "Escape") { setDraft(value); setEditing(false); }
            }}
            className="w-full min-w-0 border border-blue-400 rounded px-1.5 py-0.5 text-xs focus:outline-none focus:ring-1 focus:ring-blue-400 bg-blue-50"
          />
        );
      }
      return (
        <span
          onClick={() => { setDraft(value); setEditing(true); }}
          className={`block min-h-5 rounded px-1.5 py-0.5 cursor-text text-xs hover:bg-blue-50 hover:ring-1 hover:ring-blue-200 transition-all ${
            value ? "text-gray-800" : "text-gray-300 italic"
          }`}
        >
          {value || placeholder}
        </span>
      );
    }

    // ─── AssigneeCell ─────────────────────────────────────────────────────────────
    function AssigneeCell({ value, employees, onSave }) {
      const [open, setOpen] = useState(false);
      const initial = value ? value.charAt(0).toUpperCase() : null;

      return (
        <div className="relative flex justify-center">
          {/* Avatar bubble */}
          <button
            onClick={() => setOpen(v => !v)}
            title={value || "Click to assign"}
            className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold transition-all select-none ${
              value
                ? "bg-blue-600 text-white hover:bg-blue-500 shadow-sm"
                : "bg-gray-100 text-gray-300 hover:bg-gray-200 border-2 border-dashed border-gray-300"
            }`}
          >
            {value ? initial : <span className="text-lg leading-none mb-0.5">+</span>}
          </button>

          {open && (
            <>
              {/* Backdrop to close on outside click */}
              <div className="fixed inset-0 z-10" onClick={() => setOpen(false)} />
              {/* Dropdown menu */}
              <div className="absolute z-20 top-8 left-1/2 -translate-x-1/2 bg-white rounded-xl shadow-xl border border-gray-200 py-1.5 min-w-44 overflow-hidden">
                <button
                  onClick={() => { onSave(""); setOpen(false); }}
                  className={`w-full text-left px-3 py-1.5 text-xs hover:bg-gray-50 flex items-center gap-2 ${
                    !value ? "text-blue-600 font-semibold" : "text-gray-400 italic"
                  }`}
                >
                  <span className="w-5 h-5 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 flex-none text-xs font-bold">—</span>
                  Unassigned
                </button>
                {employees.length === 0 ? (
                  <p className="px-3 py-2 text-xs text-gray-300 italic">Add employees in Location Settings</p>
                ) : (
                  employees.map(emp => (
                    <button
                      key={emp.id}
                      onClick={() => { onSave(emp.name); setOpen(false); }}
                      className={`w-full text-left px-3 py-1.5 text-xs flex items-center gap-2 transition-colors ${
                        value === emp.name
                          ? "bg-blue-50 text-blue-700 font-semibold"
                          : "text-gray-700 hover:bg-blue-50"
                      }`}
                    >
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold flex-none ${
                        value === emp.name ? "bg-blue-600 text-white" : "bg-blue-400 text-white"
                      }`}>
                        {emp.name.charAt(0).toUpperCase()}
                      </span>
                      <span className="truncate">{emp.name}</span>
                      {emp.role && <span className="text-gray-400 text-xs ml-auto flex-none pl-1">{emp.role}</span>}
                    </button>
                  ))
                )}
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── ChecklistRow ─────────────────────────────────────────────────────────────
    function ChecklistRow({ item, idx, total, employees, showAssignee, showTime, showPriority, showLastDone, onUpdate, onDelete, onMoveUp, onMoveDown, onDragStart, onDragOver, onDrop, onDragEnd, isDragging, isDragOver }) {
      const today = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
      const ps = item.priority ? PRIORITY_STYLES[item.priority] : null;

      const handleCheck = () => {
        const nowDone = !item.completed;
        onUpdate("completed", nowDone);
        if (nowDone) onUpdate("lastCompleted", today);
      };

      return (
        <tr
          draggable
          onDragStart={onDragStart}
          onDragOver={onDragOver}
          onDrop={onDrop}
          onDragEnd={onDragEnd}
          className={`border-b border-gray-100 group/row transition-all ${
            isDragging  ? "opacity-40 bg-slate-100" :
            isDragOver  ? "bg-blue-50 border-t-2 border-t-blue-400" :
            item.completed ? "bg-green-50/40" :
                          "hover:bg-slate-50/60"
          }`}
        >
          {/* Drag handle */}
          <td className="px-1 py-1.5 align-middle no-print" style={{ width: "1.5rem" }}>
            <div className="flex justify-center cursor-grab active:cursor-grabbing text-gray-300 hover:text-gray-500 select-none" title="Drag to reorder">
              <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 16 16">
                <circle cx="5" cy="4"  r="1.3"/><circle cx="11" cy="4"  r="1.3"/>
                <circle cx="5" cy="8"  r="1.3"/><circle cx="11" cy="8"  r="1.3"/>
                <circle cx="5" cy="12" r="1.3"/><circle cx="11" cy="12" r="1.3"/>
              </svg>
            </div>
          </td>

          {/* Completion checkbox */}
          <td className="px-1 py-1.5 align-middle text-center" style={{ width: "2rem" }}>
            <button
              onClick={handleCheck}
              title={item.completed ? "Mark incomplete" : "Mark complete"}
              className={`w-5 h-5 rounded-full border-2 flex items-center justify-center mx-auto transition-all ${
                item.completed
                  ? "bg-green-500 border-green-500 text-white"
                  : "border-gray-300 hover:border-green-400"
              }`}
            >
              {item.completed && (
                <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7"/>
                </svg>
              )}
            </button>
          </td>

          {["task", "details", "secondaryHow"].map(f => (
            <td key={f} className="px-2 py-1.5 align-middle">
              <EditableCell
                value={item[f]}
                onSave={val => onUpdate(f, val)}
                placeholder="click to edit"
              />
            </td>
          ))}

          {/* Priority — traffic light dropdown */}
          {showPriority && (
            <td className="px-1 py-1.5 align-middle text-center" style={{ width: "7rem" }}>
              {ps ? (
                <span className={`inline-block text-xs font-semibold px-2 py-0.5 rounded-full ${ps.pill}`}>
                  <select
                    value={item.priority}
                    onChange={e => onUpdate("priority", e.target.value)}
                    className="bg-transparent border-none outline-none cursor-pointer font-semibold text-xs w-full"
                  >
                    <option value="">— none —</option>
                    {PRIORITY_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                </span>
              ) : (
                <select
                  value=""
                  onChange={e => onUpdate("priority", e.target.value)}
                  className="w-full text-xs rounded border border-transparent bg-transparent cursor-pointer text-gray-400 hover:border-gray-300 hover:bg-gray-50 focus:outline-none focus:ring-1 focus:ring-blue-400 py-0.5 px-1 transition-all"
                >
                  <option value="" disabled>— none —</option>
                  {PRIORITY_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                </select>
              )}
            </td>
          )}

          {/* Frequency — fixed dropdown */}
          <td className="px-2 py-1.5 align-middle" style={{ width: "9%" }}>
            <select
              value={item.frequency || ""}
              onChange={e => onUpdate("frequency", e.target.value)}
              className="w-full text-xs rounded border border-transparent bg-transparent cursor-pointer text-gray-700 hover:border-blue-300 hover:bg-blue-50 focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400 py-0.5 px-1 transition-all"
            >
              <option value="" disabled>— pick —</option>
              {FREQUENCY_OPTIONS.map(opt => (
                <option key={opt} value={opt}>{opt}</option>
              ))}
            </select>
          </td>

          {/* Assignee — bubble avatar with dropdown */}
          {showAssignee && (
            <td className="px-1 py-1.5 align-middle text-center" style={{ width: "2.5rem" }}>
              <AssigneeCell
                value={item.assignee}
                employees={employees}
                onSave={val => onUpdate("assignee", val)}
              />
            </td>
          )}

          {/* Time */}
          {showTime && (
            <td className="px-2 py-1.5 align-middle" style={{ width: "4rem" }}>
              <EditableCell
                value={item.time}
                onSave={val => onUpdate("time", val)}
                placeholder="—"
              />
            </td>
          )}

          {/* Last Done */}
          {showLastDone && (
            <td className="px-2 py-1.5 align-middle" style={{ width: "6.5rem" }}>
              <EditableCell
                value={item.lastCompleted}
                onSave={val => onUpdate("lastCompleted", val)}
                placeholder="—"
              />
            </td>
          )}

          {/* Actions — delete always visible, reorder on hover */}
          <td className="px-1 py-1 align-middle no-print" style={{ width: "4rem" }}>
            <div className="flex items-center gap-0.5">
              <div className="flex opacity-0 group-hover/row:opacity-100 transition-opacity">
                <button onClick={onMoveUp} disabled={idx === 0}
                  className="p-1 rounded text-gray-300 hover:text-gray-500 disabled:opacity-20 hover:bg-gray-100 text-xs leading-none"
                  title="Move up"
                >▲</button>
                <button onClick={onMoveDown} disabled={idx === total - 1}
                  className="p-1 rounded text-gray-300 hover:text-gray-500 disabled:opacity-20 hover:bg-gray-100 text-xs leading-none"
                  title="Move down"
                >▼</button>
              </div>
              {/* Delete always visible */}
              <button onClick={onDelete}
                className="p-1 rounded text-gray-300 hover:text-red-500 hover:bg-red-50 text-xs leading-none"
                title="Delete row"
              >✕</button>
            </div>
          </td>
        </tr>
      );
    }

    // ─── ChecklistPanel ───────────────────────────────────────────────────────────
    const ACCENT = {
      amber:  { border: "border-l-4 border-amber-400",  bg: "bg-amber-50",   title: "text-amber-600",  count: "bg-amber-100 text-amber-700",  add: "text-amber-600 border-amber-300 hover:bg-amber-50",  dot: "bg-amber-400"  },
      emerald:{ border: "border-l-4 border-emerald-400", bg: "bg-emerald-50", title: "text-emerald-600", count: "bg-emerald-100 text-emerald-700", add: "text-emerald-600 border-emerald-300 hover:bg-emerald-50", dot: "bg-emerald-400" },
      violet: { border: "border-l-4 border-violet-400",  bg: "bg-violet-50",  title: "text-violet-600",  count: "bg-violet-100 text-violet-700",  add: "text-violet-600 border-violet-300 hover:bg-violet-50",  dot: "bg-violet-400"  },
    };

    // Eye-toggle icon
    function EyeIcon({ open }) {
      return open ? (
        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
        </svg>
      ) : (
        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
        </svg>
      );
    }

    function ChecklistPanel({ title, accent, items, employees, onUpdate, onAdd, onDelete, onMove, onReorder }) {
      const c = ACCENT[accent] || ACCENT.amber;
      const [showAssignee,  setShowAssignee]  = useState(true);
      const [showTime,      setShowTime]      = useState(true);
      const [showPriority,  setShowPriority]  = useState(true);
      const [showLastDone,  setShowLastDone]  = useState(true);
      const [dragIdx,       setDragIdx]       = useState(null);
      const [dragOverIdx,   setDragOverIdx]   = useState(null);

      const completedCount = items.filter(i => i.completed).length;
      const totalCols = 2 + 3 + (showPriority ? 1 : 0) + 1 + (showAssignee ? 1 : 0) + (showTime ? 1 : 0) + (showLastDone ? 1 : 0) + 1;

      const ToggleTh = ({ show, onToggle, label, width, center }) => (
        <th className={`py-2 px-2 whitespace-nowrap ${center ? "text-center" : "text-left"}`} style={{ width }}>
          <div className={`flex items-center gap-1 ${center ? "justify-center" : ""}`}>
            {show && <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{label}</span>}
            <button onClick={onToggle} title={`${show ? "Hide" : "Show"} ${label} column`}
              className={`p-0.5 rounded transition-colors no-print ${show ? "text-gray-400 hover:text-gray-600" : "text-gray-300 hover:text-gray-500"}`}>
              <EyeIcon open={show} />
            </button>
          </div>
        </th>
      );

      return (
        <div className="flex flex-col bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden print-panel">
          {/* Panel header */}
          <div className={`${c.bg} ${c.border} px-4 py-3 flex items-center gap-2.5 border-b border-gray-100`}>
            <span className={`w-2 h-2 rounded-full flex-none ${c.dot}`} />
            <h3 className={`font-bold text-sm uppercase tracking-widest mr-1 ${c.title}`}>{title}</h3>
            <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full ${c.count}`}>
              {items.length} task{items.length !== 1 ? "s" : ""}
            </span>
            <span className={`text-xs font-semibold px-2.5 py-0.5 rounded-full ${c.count}`}>
              {formatTime(items.reduce((s, i) => s + parseMinutes(i.time), 0))}
            </span>
            {items.length > 0 && (
              <span className="ml-auto text-xs font-semibold px-2.5 py-0.5 rounded-full bg-green-100 text-green-700">
                {completedCount}/{items.length} done
              </span>
            )}
          </div>

          {/* Table */}
          <div className="overflow-x-auto">
            <table className="w-full min-w-max text-xs">
              <thead>
                <tr className="bg-gray-50 border-b border-gray-200">
                  <th className="no-print" style={{ width: "1.5rem" }} />
                  <th className="py-2 px-1 text-center no-print" style={{ width: "2rem" }}>
                    <span className="text-xs font-semibold text-gray-500 uppercase tracking-wide">✓</span>
                  </th>
                  {[
                    { label: "Task",          width: "20%" },
                    { label: "Details",       width: "18%" },
                    { label: "Secondary How", width: "16%" },
                  ].map(({ label, width }) => (
                    <th key={label} className="text-left px-2 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap" style={{ width }}>
                      {label}
                    </th>
                  ))}
                  <ToggleTh show={showPriority} onToggle={() => setShowPriority(v=>!v)} label="Priority" width="7rem" />
                  <th className="text-left px-2 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap" style={{ width: "9%" }}>
                    Frequency
                  </th>
                  <ToggleTh show={showAssignee} onToggle={() => setShowAssignee(v=>!v)} label="Who" width="2.5rem" center />
                  <ToggleTh show={showTime}     onToggle={() => setShowTime(v=>!v)}     label="Time (min)" width="4rem" />
                  <ToggleTh show={showLastDone} onToggle={() => setShowLastDone(v=>!v)} label="Last Done" width="6.5rem" />
                  <th className="no-print" style={{ width: "4rem" }} />
                </tr>
              </thead>
              <tbody>
                {items.length === 0 ? (
                  <tr>
                    <td colSpan={totalCols} className="text-center py-8 text-gray-300 text-xs italic">
                      No items yet — add one below
                    </td>
                  </tr>
                ) : items.map((item, i) => (
                  <ChecklistRow
                    key={item.id}
                    item={item}
                    idx={i}
                    total={items.length}
                    employees={employees ?? []}
                    showAssignee={showAssignee}
                    showTime={showTime}
                    showPriority={showPriority}
                    showLastDone={showLastDone}
                    onUpdate={(f, v) => onUpdate(item.id, f, v)}
                    onDelete={() => onDelete(item.id)}
                    onMoveUp={() => onMove(item.id, "up")}
                    onMoveDown={() => onMove(item.id, "down")}
                    isDragging={dragIdx === i}
                    isDragOver={dragOverIdx === i && dragIdx !== i}
                    onDragStart={(e) => { e.dataTransfer.effectAllowed = "move"; setDragIdx(i); }}
                    onDragOver={(e) => { e.preventDefault(); setDragOverIdx(i); }}
                    onDrop={(e) => { e.preventDefault(); if (dragIdx !== null && dragIdx !== i) onReorder(dragIdx, i); setDragIdx(null); setDragOverIdx(null); }}
                    onDragEnd={() => { setDragIdx(null); setDragOverIdx(null); }}
                  />
                ))}
              </tbody>
            </table>
          </div>

          {/* Add row */}
          <div className="p-2 border-t border-gray-100 no-print">
            <button
              onClick={onAdd}
              className={`w-full py-1.5 text-xs rounded-lg border border-dashed transition-colors ${c.add}`}
            >
              + Add Item
            </button>
          </div>
        </div>
      );
    }

    // ─── Print helper ─────────────────────────────────────────────────────────────
    function openPrintWindow(location, room, view) {
      const LABEL = { restocking: "Restocking Checklist", cleaning: "Cleaning Checklist", monthly: "Monthly Checklist" };
      const LIST  = { restocking: room.restocking, cleaning: room.cleaning, monthly: room.monthly };
      const fields = ["task", "details", "secondaryHow", "frequency", "assignee", "time"];
      const cols   = ["Task", "Details", "Secondary How", "Frequency", "Assignee", "Time"];
      const items  = LIST[view] ?? [];
      const date   = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });

      const rows = items.length
        ? items.map(item =>
            `<tr>${fields.map(f => `<td>${item[f] ? item[f].replace(/</g,"&lt;") : ""}</td>`).join("")}</tr>`
          ).join("")
        : `<tr><td colspan="5" style="text-align:center;color:#aaa;font-style:italic;padding:16pt">No items</td></tr>`;

      const html = `<!DOCTYPE html>
<html><head>
  <meta charset="utf-8">
  <title>${location} — ${room.name} — ${LABEL[view]}</title>
  <style>
    body { font-family: Arial, sans-serif; font-size: 10pt; margin: 0; background: white; }
    @page { size: landscape; margin: 1.2cm; }
    .header { border-bottom: 2px solid #222; padding-bottom: 6pt; margin-bottom: 12pt; }
    h1 { font-size: 14pt; font-weight: bold; margin: 0 0 3pt; }
    .sub { font-size: 9pt; color: #666; margin: 0; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f0f0f0; font-weight: bold; text-align: left; padding: 5pt 7pt;
         font-size: 8.5pt; text-transform: uppercase; letter-spacing: .04em;
         border: 1px solid #bbb; }
    td { padding: 5pt 7pt; border: 1px solid #bbb; font-size: 9pt; vertical-align: top; min-width: 80pt; }
    tr:nth-child(even) td { background: #fafafa; }
  </style>
</head><body>
  <div class="header">
    <h1>${location} — ${room.name}</h1>
    <p class="sub">${LABEL[view]} &nbsp;·&nbsp; ${date}</p>
  </div>
  <table>
    <thead><tr>${cols.map(c => `<th>${c}</th>`).join("")}</tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <script>window.onload = () => { window.print(); }<\/script>
</body></html>`;

      const w = window.open("", "_blank");
      if (w) { w.document.write(html); w.document.close(); }
    }

    // ─── LocationDashboard ───────────────────────────────────────────────────────
    function LocationDashboard({ loc, locData, locColor, onSelectRoom }) {
      const rooms = locData.rooms;
      const employees = locData.employees ?? [];

      // Flatten all items per list type across every room
      const byType = {
        restocking: rooms.flatMap(r => r.restocking),
        cleaning:   rooms.flatMap(r => r.cleaning),
        monthly:    rooms.flatMap(r => r.monthly),
      };
      const allItems = [...byType.restocking, ...byType.cleaning, ...byType.monthly];
      const totalTasks = allItems.length;

      // Time totals per list type
      const timeByType = {
        restocking: byType.restocking.reduce((s, i) => s + parseMinutes(i.time), 0),
        cleaning:   byType.cleaning.reduce((s, i)   => s + parseMinutes(i.time), 0),
        monthly:    byType.monthly.reduce((s, i)     => s + parseMinutes(i.time), 0),
      };

      // Assignment breakdown
      const assignMap = {};
      allItems.forEach(i => {
        const k = i.assignee?.trim() || "Unassigned";
        assignMap[k] = (assignMap[k] || 0) + 1;
      });
      const assignments = Object.entries(assignMap).sort((a, b) => {
        if (a[0] === "Unassigned") return 1;
        if (b[0] === "Unassigned") return -1;
        return b[1] - a[1];
      });

      // Priority breakdown
      const priorityCounts = PRIORITY_OPTIONS.map(p => ({
        label: p,
        count: allItems.filter(i => i.priority === p).length,
      }));

      // Frequency breakdown — always show all canonical options in order
      const FREQ_COLORS = {
        "Weekly":    "bg-sky-100 text-sky-700 border-sky-200",
        "Bi-Weekly": "bg-cyan-100 text-cyan-700 border-cyan-200",
        "Monthly":   "bg-violet-100 text-violet-700 border-violet-200",
        "Quarterly": "bg-indigo-100 text-indigo-700 border-indigo-200",
        "Yearly":    "bg-pink-100 text-pink-700 border-pink-200",
        "As Needed": "bg-amber-100 text-amber-700 border-amber-200",
      };
      const freqMap = {};
      allItems.forEach(i => {
        const k = i.frequency?.trim();
        if (k) freqMap[k] = (freqMap[k] || 0) + 1;
      });
      // Build list in canonical order, always including all six options
      const frequencies = FREQUENCY_OPTIONS.map(opt => [opt, freqMap[opt] || 0]);

      const LIST_META = [
        { key: "restocking", label: "Restocking", bar: "bg-amber-500", light: "bg-amber-50", border: "border-amber-200", text: "text-amber-700", pill: "bg-amber-100 text-amber-700", abbr: "R" },
        { key: "cleaning",   label: "Cleaning",   bar: "bg-emerald-500", light: "bg-emerald-50", border: "border-emerald-200", text: "text-emerald-700", pill: "bg-emerald-100 text-emerald-700", abbr: "C" },
        { key: "monthly",    label: "Monthly",    bar: "bg-violet-500",  light: "bg-violet-50",  border: "border-violet-200",  text: "text-violet-700",  pill: "bg-violet-100 text-violet-700",  abbr: "M" },
      ];

      return (
        <div className="p-6 overflow-auto h-full">

          {/* Page header */}
          <div className="mb-6">
            <div className="flex items-center gap-2 mb-1">
              <span className={`w-2.5 h-2.5 rounded-full ${locColor.dot}`} />
              <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">{loc}</p>
            </div>
            <h2 className="text-2xl font-bold text-gray-800">Dashboard</h2>
            <p className="text-xs text-gray-400 mt-0.5">
              {rooms.length} room{rooms.length !== 1 ? "s" : ""} &nbsp;·&nbsp; {totalTasks} total task{totalTasks !== 1 ? "s" : ""} &nbsp;·&nbsp; {employees.length} employee{employees.length !== 1 ? "s" : ""}
            </p>
          </div>

          {/* ── Checklist summary cards ── */}
          <div className="grid grid-cols-3 gap-4 mb-5">
            {LIST_META.map(({ key, label, bar, text }) => {
              const count     = byType[key].length;
              const mins      = timeByType[key];
              const done      = byType[key].filter(i => i.completed).length;
              const donePct   = count > 0 ? Math.round((done / count) * 100) : 0;
              return (
                <div key={key} className="bg-white rounded-2xl border border-gray-200 shadow-sm p-5">
                  <div className={`inline-flex items-center justify-center w-10 h-10 rounded-xl ${bar} mb-4`}>
                    <svg className="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                    </svg>
                  </div>
                  <p className={`text-xs font-bold uppercase tracking-widest ${text} mb-2`}>{label}</p>
                  <p className="text-3xl font-extrabold text-gray-800 leading-none">{count}</p>
                  <p className="text-xs text-gray-400 mt-1">task{count !== 1 ? "s" : ""}</p>
                  {/* Completion bar */}
                  {count > 0 && (
                    <div className="mt-3">
                      <div className="flex justify-between text-xs text-gray-400 mb-1">
                        <span>{done}/{count} complete</span>
                        <span>{donePct}%</span>
                      </div>
                      <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div className="h-1.5 bg-green-400 rounded-full transition-all" style={{ width: `${donePct}%` }} />
                      </div>
                    </div>
                  )}
                  <div className="mt-3 pt-3 border-t border-gray-100">
                    <p className="text-xs text-gray-400 mb-0.5 uppercase tracking-wide font-semibold">Total Time</p>
                    <p className={`text-lg font-bold ${text}`}>{formatTime(mins)}</p>
                  </div>
                </div>
              );
            })}
          </div>

          {/* ── Priority breakdown ── */}
          <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4 mb-5">
            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Priority Breakdown</h3>
            {allItems.length === 0 ? (
              <p className="text-xs text-gray-300 italic">No tasks yet</p>
            ) : (
              <div className="flex gap-6">
                {priorityCounts.map(({ label, count }) => {
                  const ps = PRIORITY_STYLES[label];
                  const pct = totalTasks > 0 ? Math.round((count / totalTasks) * 100) : 0;
                  return (
                    <div key={label} className="flex-1">
                      <div className="flex items-center gap-2 mb-1.5">
                        <span className={`text-xs font-bold px-2.5 py-0.5 rounded-full border ${ps.pill}`}>{label}</span>
                        <span className="text-xs font-bold text-gray-600 ml-auto">{count}</span>
                      </div>
                      <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div className={`h-2 rounded-full transition-all ${
                          label === "High" ? "bg-red-400" : label === "Medium" ? "bg-yellow-400" : "bg-green-400"
                        }`} style={{ width: `${pct}%` }} />
                      </div>
                      <p className="text-xs text-gray-400 mt-1">{pct}% of tasks</p>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ── Assignment & Frequency row ── */}
          <div className="grid grid-cols-2 gap-4 mb-5">

            {/* Assignment breakdown */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
              <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Assignment Breakdown</h3>
              {allItems.length === 0 ? (
                <p className="text-xs text-gray-300 italic">No tasks yet</p>
              ) : assignments.length === 0 ? (
                <p className="text-xs text-gray-300 italic">No assignments set</p>
              ) : (
                <div className="space-y-3">
                  {assignments.map(([name, count]) => {
                    const isUnassigned = name === "Unassigned";
                    const pct = totalTasks > 0 ? (count / totalTasks) * 100 : 0;
                    const emp = employees.find(e => e.name === name);
                    return (
                      <div key={name} className="flex items-center gap-2.5">
                        <div className={`flex-none w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${
                          isUnassigned ? "bg-gray-200 text-gray-400" : "bg-blue-600 text-white"
                        }`}>
                          {isUnassigned ? "?" : name.charAt(0).toUpperCase()}
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="flex justify-between items-baseline mb-1">
                            <div className="min-w-0">
                              <span className={`text-xs font-semibold truncate ${isUnassigned ? "text-gray-400 italic" : "text-gray-700"}`}>{name}</span>
                              {emp?.role && <span className="text-xs text-gray-400 ml-1">({emp.role})</span>}
                            </div>
                            <span className="text-xs font-bold text-gray-500 ml-2 flex-none">{count}</span>
                          </div>
                          <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                            <div
                              className={`h-1.5 rounded-full transition-all ${isUnassigned ? "bg-gray-300" : "bg-blue-500"}`}
                              style={{ width: `${pct}%` }}
                            />
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Frequency breakdown */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-4">
              <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Frequency Breakdown</h3>
              {allItems.length === 0 ? (
                <p className="text-xs text-gray-300 italic">No tasks yet</p>
              ) : (
                <div className="space-y-2.5">
                  {frequencies.map(([freq, count]) => {
                    const pct = totalTasks > 0 ? (count / totalTasks) * 100 : 0;
                    const pillClass = FREQ_COLORS[freq] || "bg-gray-100 text-gray-600 border-gray-200";
                    return (
                      <div key={freq} className="flex items-center gap-2.5">
                        <span className={`flex-none text-xs font-semibold px-2 py-0.5 rounded-full border ${pillClass} w-24 text-center`}>
                          {freq}
                        </span>
                        <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                          <div
                            className="h-1.5 rounded-full bg-gray-400 transition-all"
                            style={{ width: `${pct}%` }}
                          />
                        </div>
                        <span className="flex-none text-xs font-bold text-gray-500 w-6 text-right">{count}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* ── Room overview ── */}
          {rooms.length > 0 && (
            <div>
              <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Rooms & Areas</h3>
              <div className="grid grid-cols-3 gap-3">
                {rooms.map(room => {
                  const totalRoom = room.restocking.length + room.cleaning.length + room.monthly.length;
                  const roomMins  = [...room.restocking, ...room.cleaning, ...room.monthly].reduce((s, i) => s + parseMinutes(i.time), 0);
                  return (
                    <button
                      key={room.id}
                      onClick={() => onSelectRoom(room.id)}
                      className="text-left bg-white rounded-xl border border-gray-200 shadow-sm p-3.5 hover:border-blue-300 hover:shadow-md transition-all group/card"
                    >
                      <div className="flex items-start justify-between mb-2.5">
                        <p className="text-sm font-bold text-gray-800 group-hover/card:text-blue-700 transition-colors">{room.name}</p>
                        {roomMins > 0 && <span className="text-xs text-gray-400 flex-none ml-2">{formatTime(roomMins)}</span>}
                      </div>
                      <div className="flex gap-1.5">
                        {LIST_META.map(({ key, abbr, pill }) => (
                          <span key={key} className={`text-xs px-2 py-0.5 rounded-full font-semibold ${pill}`}>
                            {room[key].length} {abbr}
                          </span>
                        ))}
                      </div>
                      <p className="text-xs text-gray-400 mt-2">{totalRoom} task{totalRoom !== 1 ? "s" : ""}</p>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Empty state */}
          {rooms.length === 0 && (
            <div className="flex flex-col items-center justify-center py-16 text-center">
              <div className="text-5xl mb-4 opacity-30">🏠</div>
              <p className="text-sm text-gray-400">No rooms added yet</p>
              <p className="text-xs text-gray-300 mt-1">Use the sidebar to add your first room or area</p>
            </div>
          )}
        </div>
      );
    }

    // ─── LocationSettingsModal ────────────────────────────────────────────────────
    function LocationSettingsModal({ loc, employees, onUpdate, onClose }) {
      // Local copy — only written to parent on Save
      const [draft,       setDraft]       = useState(() => employees.map(e => ({ ...e })));
      const [newName,     setNewName]     = useState("");
      const [editingId,   setEditingId]   = useState(null);
      const [editingName, setEditingName] = useState("");

      const addEmployee = () => {
        if (!newName.trim()) return;
        setDraft(prev => [...prev, { id: uid(), name: newName.trim(), role: "" }]);
        setNewName("");
      };

      const deleteEmployee = (id) => setDraft(prev => prev.filter(e => e.id !== id));

      const commitRename = () => {
        if (!editingName.trim()) { setEditingId(null); return; }
        setDraft(prev => prev.map(e => e.id === editingId ? { ...e, name: editingName.trim() } : e));
        setEditingId(null);
      };

      const updateRole = (id, role) => setDraft(prev => prev.map(e => e.id === id ? { ...e, role } : e));

      const handleSave = () => { onUpdate(draft); onClose(); };

      return (
        /* Backdrop */
        <div
          className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm"
          onClick={e => { if (e.target === e.currentTarget) handleSave(); }}
        >
          {/* Panel */}
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 flex flex-col overflow-hidden">

            {/* Header */}
            <div className="flex items-center justify-between px-5 py-4 bg-blue-600">
              <div>
                <p className="text-white font-bold text-sm tracking-wide">Location Settings</p>
                <p className="text-blue-200 text-xs mt-0.5">{loc}</p>
              </div>
              <button
                onClick={onClose}
                className="p-1.5 rounded-lg text-blue-200 hover:text-white hover:bg-blue-500 transition-colors"
              >
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>

            {/* Body */}
            <div className="p-5 flex-1 overflow-y-auto">

              {/* Section heading */}
              <div className="flex items-center gap-2 mb-3">
                <svg className="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <h3 className="text-sm font-bold text-gray-700 uppercase tracking-wide">Employees</h3>
                <span className="ml-auto text-xs text-gray-400">{draft.length} total</span>
              </div>

              {/* Employee list */}
              <div className="space-y-2 mb-4">
                {draft.length === 0 && (
                  <p className="text-xs text-gray-400 italic text-center py-4 border border-dashed border-gray-200 rounded-lg">
                    No employees yet — add one below
                  </p>
                )}
                {draft.map(emp => (
                  <div key={emp.id} className="group/emp flex items-center gap-2 p-2.5 rounded-lg border border-gray-100 bg-gray-50 hover:bg-white hover:border-gray-200 transition-all">

                    {/* Avatar initial */}
                    <div className="flex-none w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center text-xs font-bold text-blue-600 uppercase">
                      {emp.name.charAt(0)}
                    </div>

                    {/* Name (editable) */}
                    <div className="flex-1 min-w-0">
                      {editingId === emp.id ? (
                        <input
                          autoFocus
                          value={editingName}
                          onChange={e => setEditingName(e.target.value)}
                          onBlur={commitRename}
                          onKeyDown={e => { if (e.key === "Enter") commitRename(); if (e.key === "Escape") setEditingId(null); }}
                          className="w-full text-xs border border-blue-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-blue-400"
                        />
                      ) : (
                        <button
                          onClick={() => { setEditingId(emp.id); setEditingName(emp.name); }}
                          className="text-xs font-medium text-gray-800 hover:text-blue-600 text-left w-full truncate"
                          title="Click to rename"
                        >
                          {emp.name}
                        </button>
                      )}

                      {/* Role */}
                      <input
                        placeholder="Role / title (optional)"
                        value={emp.role}
                        onChange={e => updateRole(emp.id, e.target.value)}
                        className="mt-1 w-full text-xs text-gray-400 bg-transparent border-none outline-none placeholder-gray-300 focus:text-gray-600"
                      />
                    </div>

                    {/* Delete */}
                    <button
                      onClick={() => deleteEmployee(emp.id)}
                      className="flex-none p-1 rounded text-gray-300 hover:text-red-500 hover:bg-red-50 opacity-0 group-hover/emp:opacity-100 transition-all"
                      title="Remove employee"
                    >
                      <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                      </svg>
                    </button>
                  </div>
                ))}
              </div>

              {/* Add employee */}
              <div className="flex gap-2">
                <input
                  placeholder="Employee name..."
                  value={newName}
                  onChange={e => setNewName(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") addEmployee(); }}
                  className="flex-1 text-xs border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-400 focus:border-blue-400"
                />
                <button
                  onClick={addEmployee}
                  className="px-3 py-2 text-xs bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-semibold transition-colors"
                >
                  + Add
                </button>
              </div>
            </div>

            {/* Footer */}
            <div className="px-5 py-3 border-t border-gray-100 bg-gray-50 flex items-center justify-between">
              <button
                onClick={onClose}
                className="px-4 py-2 text-xs font-medium bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-500 shadow-sm transition-colors"
              >
                Cancel
              </button>
              <button
                onClick={handleSave}
                className="px-5 py-2 text-xs font-semibold bg-blue-600 text-white rounded-xl hover:bg-blue-700 shadow-sm transition-colors"
              >
                Save
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── Persistence helpers ──────────────────────────────────────────────────────
    const STORAGE_KEY = "housemanager_data";

    const loadData = () => {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return JSON.parse(saved);
      } catch (e) {}
      return buildSampleData();
    };

    const saveData = (data) => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
    };

    // ─── App ─────────────────────────────────────────────────────────────────────
    function App() {
      const [data, setData] = useState(loadData);
      const [loc, setLoc] = useState(LOCATIONS[0]);
      const [roomId, setRoomId] = useState(() => {
        const d = loadData();
        return d["The Park House"]?.rooms[0]?.id ?? null;
      });

      // Persist all data changes to localStorage automatically
      useEffect(() => { saveData(data); }, [data]);
      const [view, setView] = useState("restocking");
      const [addingRoom,   setAddingRoom]   = useState(false);
      const [newRoomName,  setNewRoomName]  = useState("");
      const [editingRoom,  setEditingRoom]  = useState(null); // { id, name }
      const [showSettings, setShowSettings] = useState(false);

      // ── Derived ─────────────────────────────────────────────────
      const locData = data[loc];
      const room = locData.rooms.find(r => r.id === roomId) ?? null;
      const locColor = LOCATION_COLORS[loc];

      // ── Data helpers ─────────────────────────────────────────────
      const setLoc2 = (l) => { setLoc(l); setRoomId(null); setView("restocking"); };

      const upd = (fn) => setData(prev => ({ ...prev, [loc]: fn(prev[loc]) }));
      const updRoom = (fn) => upd(d => ({ ...d, rooms: d.rooms.map(r => r.id === roomId ? fn(r) : r) }));
      const updList = (key, fn) => updRoom(r => ({ ...r, [key]: fn(r[key]) }));

      // Room ops
      const addRoom = () => {
        if (!newRoomName.trim()) return;
        const r = createRoom(newRoomName.trim());
        upd(d => ({ ...d, rooms: [...d.rooms, r] }));
        setRoomId(r.id); setNewRoomName(""); setAddingRoom(false);
      };
      const deleteRoom = (id) => {
        upd(d => ({ ...d, rooms: d.rooms.filter(r => r.id !== id) }));
        if (roomId === id) setRoomId(null);
      };
      const renameRoom = () => {
        if (!editingRoom?.name?.trim()) { setEditingRoom(null); return; }
        upd(d => ({ ...d, rooms: d.rooms.map(r => r.id === editingRoom.id ? { ...r, name: editingRoom.name.trim() } : r) }));
        setEditingRoom(null);
      };

      // Employee ops
      const updateEmployees = (employees) => upd(d => ({ ...d, employees }));

      // Item ops
      const addItem    = (key) => updList(key, items => [...items, createItem()]);
      const deleteItem = (key, id) => updList(key, items => items.filter(i => i.id !== id));
      const updateItem = (key, id, field, val) => updList(key, items => items.map(i => i.id === id ? { ...i, [field]: val } : i));
      const moveItem   = (key, id, dir) => updList(key, items => {
        const arr = [...items];
        const idx = arr.findIndex(i => i.id === id);
        if (dir === "up"   && idx > 0)               [arr[idx-1], arr[idx]] = [arr[idx], arr[idx-1]];
        if (dir === "down" && idx < arr.length - 1)  [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
        return arr;
      });
      const reorderItem = (key, fromIdx, toIdx) => updList(key, items => {
        const arr = [...items];
        const [moved] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, moved);
        return arr;
      });

      // ─────────────────────────────────────────────────────────────
      return (
        <div className="h-screen flex flex-col bg-gray-100" style={{ fontFamily: "'Inter', system-ui, -apple-system, sans-serif" }}>

          {/* ── Print + Font styles ── */}
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
            @media print {
              .no-print  { display: none !important; }
              .print-only { display: block !important; }
              body, html { background: white !important; height: auto !important; overflow: visible !important; }
              #root { height: auto !important; overflow: visible !important; }
              .print-scroll { overflow: visible !important; height: auto !important; }
              @page { size: landscape; margin: 1.2cm; }
              table { border-collapse: collapse; width: 100%; font-size: 9pt; }
              th, td { border: 1px solid #ccc; padding: 3pt 5pt; }
              th { background-color: #f4f4f4 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
              .print-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14pt; }
              .print-panel { break-inside: avoid; }
              .print-header { display: block !important; margin-bottom: 12pt; border-bottom: 2px solid #333; padding-bottom: 6pt; }
            }
            .print-header { display: none; }
          `}</style>

          {/* ── Header / Location Tabs ── */}
          <header className="no-print flex-none flex items-center gap-0 bg-white border-b border-gray-200 shadow-sm">
            {/* Logo area */}
            <div className="px-5 py-3.5 border-r border-gray-200 flex items-center gap-2.5">
              <div className="w-7 h-7 rounded-lg bg-blue-600 flex items-center justify-center flex-none">
                <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
              </div>
              <div>
                <p className="text-blue-600 font-bold text-sm leading-none tracking-wide">House Manager</p>
                <p className="text-gray-400 text-xs mt-0.5">Checklist System</p>
              </div>
            </div>

            {/* Location tabs */}
            <div className="flex items-stretch h-full">
              {LOCATIONS.map(l => {
                const active = loc === l;
                return (
                  <button
                    key={l}
                    onClick={() => setLoc2(l)}
                    className={`px-5 py-3.5 text-sm font-semibold transition-all border-b-2 ${
                      active
                        ? "text-blue-600 border-blue-600"
                        : "text-gray-500 border-transparent hover:text-gray-800 hover:border-gray-300"
                    }`}
                  >
                    {l}
                  </button>
                );
              })}
            </div>
          </header>

          {/* ── Body ── */}
          <div className="flex flex-1 overflow-hidden">

            {/* ── Sidebar ── */}
            {/* ── Location Settings Modal ── */}
            {showSettings && (
              <LocationSettingsModal
                loc={loc}
                employees={locData.employees ?? []}
                onUpdate={updateEmployees}
                onClose={() => setShowSettings(false)}
              />
            )}

            <aside className="no-print flex-none w-56 flex flex-col bg-white border-r border-gray-200 shadow-sm">
              <div className="px-4 py-3 border-b border-gray-200 bg-gray-50 flex items-center justify-between">
                <div>
                  <p className="text-xs font-bold text-gray-400 uppercase tracking-widest">Rooms & Areas</p>
                  <p className="text-xs text-gray-500 mt-0.5 font-medium truncate">{loc}</p>
                </div>
                <button
                  onClick={() => setShowSettings(true)}
                  title="Location settings"
                  className="p-1.5 rounded-lg text-gray-400 hover:text-slate-700 hover:bg-gray-200 transition-colors"
                >
                  <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </button>
              </div>

              <nav className="flex-1 overflow-y-auto py-2 px-2 space-y-0.5">
                {locData.rooms.length === 0 && (
                  <div className="text-center py-8 px-3">
                    <p className="text-2xl mb-2">🏠</p>
                    <p className="text-xs text-gray-400 italic">No rooms added yet.<br/>Use the button below.</p>
                  </div>
                )}
                {locData.rooms.map(r => (
                  <div
                    key={r.id}
                    className={`group/room flex items-center rounded-full transition-all ${
                      roomId === r.id ? "bg-blue-600 shadow-sm" : "hover:bg-gray-100"
                    }`}
                  >
                    {editingRoom?.id === r.id ? (
                      <input
                        autoFocus
                        value={editingRoom.name}
                        onChange={e => setEditingRoom(p => ({ ...p, name: e.target.value }))}
                        onBlur={renameRoom}
                        onKeyDown={e => { if (e.key === "Enter") renameRoom(); if (e.key === "Escape") setEditingRoom(null); }}
                        className="flex-1 mx-2 my-1 text-xs border border-blue-300 rounded-full px-3 py-1 focus:outline-none focus:ring-1 focus:ring-blue-400"
                      />
                    ) : (
                      <>
                        <button
                          onClick={() => { setRoomId(r.id); setView("restocking"); }}
                          className={`flex-1 text-left px-4 py-2 text-xs truncate font-semibold ${
                            roomId === r.id ? "text-white" : "text-gray-600"
                          }`}
                        >
                          {r.name}
                        </button>
                        <div className="pr-2 flex gap-0.5 opacity-0 group-hover/room:opacity-100 transition-opacity">
                          <button
                            onClick={() => setEditingRoom({ id: r.id, name: r.name })}
                            title="Rename"
                            className={`p-1 rounded-full ${roomId === r.id ? "text-blue-200 hover:text-white hover:bg-blue-500" : "text-gray-300 hover:text-blue-500 hover:bg-blue-50"}`}
                          >
                            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
                            </svg>
                          </button>
                          <button
                            onClick={() => deleteRoom(r.id)}
                            title="Delete room"
                            className={`p-1 rounded-full ${roomId === r.id ? "text-blue-200 hover:text-white hover:bg-blue-500" : "text-gray-300 hover:text-red-500 hover:bg-red-50"}`}
                          >
                            <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                          </button>
                        </div>
                      </>
                    )}
                  </div>
                ))}
              </nav>

              {/* Add room */}
              <div className="p-3 border-t border-gray-200">
                {addingRoom ? (
                  <div className="space-y-2">
                    <input
                      autoFocus
                      placeholder="Room or area name..."
                      value={newRoomName}
                      onChange={e => setNewRoomName(e.target.value)}
                      onKeyDown={e => {
                        if (e.key === "Enter") addRoom();
                        if (e.key === "Escape") { setAddingRoom(false); setNewRoomName(""); }
                      }}
                      className="w-full text-xs border border-gray-200 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent"
                    />
                    <div className="flex gap-1.5">
                      <button onClick={addRoom} className="flex-1 py-2 text-xs bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-semibold transition-colors">Add</button>
                      <button onClick={() => { setAddingRoom(false); setNewRoomName(""); }} className="py-2 px-3 text-xs text-gray-500 rounded-xl hover:bg-gray-100 border border-gray-200 transition-colors">Cancel</button>
                    </div>
                  </div>
                ) : (
                  <button
                    onClick={() => setAddingRoom(true)}
                    className="w-full py-2.5 text-xs text-white font-semibold bg-blue-600 hover:bg-blue-700 rounded-xl transition-colors shadow-sm"
                  >
                    + Add Room / Area
                  </button>
                )}
              </div>
            </aside>

            {/* ── Main Content ── */}
            <main className="flex-1 overflow-auto print-scroll">
              {!room ? (
                <LocationDashboard
                  loc={loc}
                  locData={locData}
                  locColor={locColor}
                  onSelectRoom={(id) => { setRoomId(id); setView("restocking"); }}
                />
              ) : (
                <div className="p-5 max-w-none">

                  {/* Print-only header */}
                  <div className="print-header">
                    <h1 style={{ fontSize: "16pt", fontWeight: "bold", margin: 0 }}>{loc} — {room.name}</h1>
                    <p style={{ fontSize: "9pt", color: "#666", marginTop: "2pt" }}>
                      {view === "restocking" ? "Restocking Checklist" : view === "cleaning" ? "Cleaning Checklist" : "Monthly Checklist"} · {new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" })}
                    </p>
                  </div>

                  {/* Screen toolbar */}
                  <div className="no-print flex items-center justify-between mb-5">
                    <div>
                      <div className="flex items-center gap-2">
                        <span className={`w-2 h-2 rounded-full ${locColor.dot}`} />
                        <p className="text-xs text-gray-400 font-semibold uppercase tracking-wider">{loc}</p>
                      </div>
                      <h2 className="text-xl font-bold text-gray-800 mt-0.5">{room.name}</h2>
                    </div>

                    <div className="flex items-center gap-2.5">
                      {/* View toggle — pill style */}
                      <div className="flex items-center gap-1.5 bg-gray-100 rounded-2xl p-1">
                        {[
                          { key: "restocking", label: "Restocking", active: "bg-amber-500"   },
                          { key: "cleaning",   label: "Cleaning",   active: "bg-emerald-500" },
                          { key: "monthly",    label: "Monthly",    active: "bg-violet-500"  },
                        ].map(({ key, label, active }) => (
                          <button
                            key={key}
                            onClick={() => setView(key)}
                            className={`px-4 py-1.5 rounded-xl text-xs font-semibold transition-all ${
                              view === key
                                ? `${active} text-white shadow-sm`
                                : "text-gray-500 hover:text-gray-800"
                            }`}
                          >
                            {label}
                          </button>
                        ))}
                      </div>

                      {/* Print */}
                      <button
                        onClick={() => openPrintWindow(loc, room, view)}
                        className="flex items-center gap-1.5 px-3.5 py-2 text-xs font-semibold bg-white border border-gray-200 rounded-xl hover:bg-gray-50 shadow-sm text-gray-600 transition-colors"
                      >
                        <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
                        </svg>
                        Print
                      </button>
                    </div>
                  </div>

                  {/* Checklist panels */}
                  {view === "restocking" && (
                    <ChecklistPanel
                      title="Restocking"
                      accent="amber"
                      items={room.restocking}
                      employees={locData.employees ?? []}
                      onUpdate={(id, f, v) => updateItem("restocking", id, f, v)}
                      onAdd={() => addItem("restocking")}
                      onDelete={id => deleteItem("restocking", id)}
                      onMove={(id, dir) => moveItem("restocking", id, dir)}
                      onReorder={(from, to) => reorderItem("restocking", from, to)}
                    />
                  )}
                  {view === "cleaning" && (
                    <ChecklistPanel
                      title="Cleaning"
                      accent="emerald"
                      items={room.cleaning}
                      employees={locData.employees ?? []}
                      onUpdate={(id, f, v) => updateItem("cleaning", id, f, v)}
                      onAdd={() => addItem("cleaning")}
                      onDelete={id => deleteItem("cleaning", id)}
                      onMove={(id, dir) => moveItem("cleaning", id, dir)}
                      onReorder={(from, to) => reorderItem("cleaning", from, to)}
                    />
                  )}
                  {view === "monthly" && (
                    <ChecklistPanel
                      title="Monthly"
                      accent="violet"
                      items={room.monthly}
                      employees={locData.employees ?? []}
                      onUpdate={(id, f, v) => updateItem("monthly", id, f, v)}
                      onAdd={() => addItem("monthly")}
                      onDelete={id => deleteItem("monthly", id)}
                      onMove={(id, dir) => moveItem("monthly", id, dir)}
                      onReorder={(from, to) => reorderItem("monthly", from, to)}
                    />
                  )}
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
